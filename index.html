<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAD BOYS FC</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#000; color:white; font-family:Arial; }

/* INTRO */
#intro{
 position:fixed;
 width:100%;
 height:100%;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:9999;
}

/* KİLİT */
.lock{
 position:fixed;
 top:15px;
 right:15px;
 font-size:26px;
 background:#111;
 padding:12px;
 border-radius:50%;
 cursor:pointer;
}

/* KART */
.card{
 background:#0a0a0a;
 border-radius:15px;
 padding:15px;
 transition:.3s;
}
.card:hover{
 transform:scale(1.03);
 box-shadow:0 0 20px #ff4500;
}

/* MVP */
.mvp{
 border:2px solid gold;
 box-shadow:0 0 20px gold;
}

/* FOTO */
.player-img{
 width:60px;
 height:60px;
 border-radius:10px;
 object-fit:cover;
}

/* SAHA */
.field{
 background:linear-gradient(#0f3d0f,#0a2a0a);
 height:300px;
 margin:20px;
 border-radius:15px;
 position:relative;
}

/* OYUNCU NOKTA */
.dot{
 position:absolute;
 background:#ff4500;
 padding:4px 8px;
 border-radius:8px;
 font-size:10px;
}

/* ADMIN */
.admin-only{ display:none; }
.admin-active .admin-only{ display:inline-block; }

/* BUTON */
.btn{
 background:#ff4500;
 padding:3px 8px;
 border-radius:6px;
 font-size:12px;
 margin:2px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1 class="text-3xl text-orange-500">BAD BOYS FC</h1>
<button onclick="start()" class="mt-4 bg-orange-500 px-6 py-2 rounded">GİR</button>
</div>

<!-- KİLİT -->
<div onclick="adminLogin()" class="lock">🔒</div>

<h1 class="text-center text-3xl mt-4 text-orange-500">BAD BOYS FC 🔥</h1>

<!-- SAHA HERKESE AÇIK -->
<div id="field" class="field"></div>

<div id="players" class="p-4 space-y-4"></div>

<script>

let admin=false;
const pass="badboys123";

function start(){
 document.getElementById("intro").style.display="none";
}

function adminLogin(){
 if(prompt("Şifre:")==pass){
   admin=true;
   document.body.classList.add("admin-active");
   render();
 }
}

/* DATA */
let players = JSON.parse(localStorage.getItem("team")) || [
{id:1,name:"HÜSEYİNCAN YÜKSEKDAĞ",role:"KALECİ",quote:"Kalede adeta kocaman bir fil gibi",x:45,y:80,g:0,a:0,yg:0},
{id:2,name:"SÜLEYMAN TUNÇELİK",role:"DEFANS",quote:"Defansın bel kemiği",x:20,y:60,g:0,a:0,yg:0},
{id:3,name:"YAKUP SUNAY",role:"DEFANS",captain:true,quote:"Her yerde olan koca yürekli kaptan",x:50,y:60,g:0,a:0,yg:0},
{id:4,name:"MEHMET UZUN",role:"DEFANS",quote:"Takımın sert adamı",x:80,y:60,g:0,a:0,yg:0},
{id:5,name:"EROL GÖNÜL",role:"ORTA SAHA",quote:"Her yerden şut atmayı sever",x:30,y:40,g:0,a:0,yg:0},
{id:6,name:"MURAT ÇAYLI",role:"FORVET",quote:"Her alanda çalım deneyebiliyo",x:70,y:40,g:0,a:0,yg:0},
{id:7,name:"EREN YILMAZ",role:"FORVET",quote:"Eşi geldiyse geçmiş olsun rakibe",x:30,y:20,g:0,a:0,yg:0},
{id:8,name:"MUSA AKSU",role:"FORVET",quote:"Kıvrak bilekleri ile tarz sahibi",x:70,y:20,g:0,a:0,yg:0}
];

function save(){
 localStorage.setItem("team",JSON.stringify(players));
}

/* STAT */
function stat(id,type,val){
 let p=players.find(x=>x.id==id);
 p[type]+=val;
 if(p[type]<0)p[type]=0;
 save();
 render();
}

/* SAHA */
function renderField(){
 let f=document.getElementById("field");
 f.innerHTML="";

 players.forEach(p=>{
  f.innerHTML+=`
  <div class="dot"
  style="left:${p.x}%; top:${p.y}%"
  ${admin ? `draggable="true" ondragend="move(event,${p.id})"` : ""}
  >
  ${p.name.split(" ")[0]}
  </div>`;
 });
}

function move(e,id){
 let rect=e.target.parentElement.getBoundingClientRect();
 let x=(e.clientX-rect.left)/rect.width*100;
 let y=(e.clientY-rect.top)/rect.height*100;

 let p=players.find(x=>x.id==id);
 p.x=x; p.y=y;
 save();
 renderField();
}

/* RENDER */
function render(){

 let best=[...players].sort((a,b)=> (b.g+b.a)-(a.g+a.a))[0];

 let area=document.getElementById("players");
 area.innerHTML="";

 players.forEach(p=>{
 area.innerHTML+=`
 <div class="card ${p.id==best.id?"mvp":""}">
   <div class="flex gap-3 items-center">
     <div>
       <div class="font-bold">
       ${p.name} ${p.captain?"👑 (C)":""}
       </div>
       <div class="text-xs text-gray-400">${p.role}</div>
       <div class="text-xs italic mt-1">${p.quote}</div>
     </div>
   </div>

   <div class="mt-2 text-sm">
     ⚽ ${p.g}
     🎯 ${p.a}
     🥅 ${p.yg}
   </div>

   <div class="admin-only mt-2">
     <button class="btn" onclick="stat(${p.id},'g',1)">+Gol</button>
     <button class="btn" onclick="stat(${p.id},'g',-1)">-</button>

     <button class="btn" onclick="stat(${p.id},'a',1)">+Asist</button>
     <button class="btn" onclick="stat(${p.id},'a',-1)">-</button>

     <button class="btn" onclick="stat(${p.id},'yg',1)">+Y.Gol</button>
     <button class="btn" onclick="stat(${p.id},'yg',-1)">-</button>
   </div>
 </div>
 `;
 });

 renderField();
}

render();

</script>

</body>
</html>
