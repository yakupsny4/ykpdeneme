<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAD BOYS FC | ULTIMATE V8</title>
    <style>
        :root {
            --neon-orange: #ff6600;
            --neon-blue: #00d4ff;
            --deep-black: #050505;
            --card-bg: rgba(20, 20, 20, 0.95);
            --gold: #ffd700;
            --pitch-green: #1a3a1a;
        }

        body {
            background-color: var(--deep-black);
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding-bottom: 120px;
            touch-action: manipulation;
        }

        /* --- Admin --- */
        .admin-bar {
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-bottom: 2px solid var(--neon-orange);
            display: flex; justify-content: center; gap: 15px;
            position: sticky; top: 0; z-index: 2000; backdrop-filter: blur(10px);
        }
        .admin-bar input { background: #111; border: 1px solid var(--neon-orange); color: white; padding: 8px; border-radius: 5px; outline: none; }

        header { text-align: center; padding: 20px; }
        .main-logo { width: 120px; border: 2px solid var(--neon-orange); border-radius: 15px; }

        /* --- Taktik Sahası (Mobil Öncelikli) --- */
        .pitch-container {
            width: 95%; max-width: 500px; aspect-ratio: 2/3;
            background: var(--pitch-green);
            margin: 20px auto;
            border: 3px solid #fff;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20% 20%;
        }
        .pitch-line {
            position: absolute; border: 2px solid rgba(255,255,255,0.5);
            pointer-events: none;
        }
        .center-circle { width: 80px; height: 80px; border: 2px solid #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); position: absolute; }
        .penalty-area { width: 60%; height: 15%; border: 2px solid #fff; position: absolute; left: 20%; }
        .top-box { top: 0; border-top: none; }
        .bottom-box { bottom: 0; border-bottom: none; }

        .draggable-player {
            position: absolute;
            background: var(--neon-orange);
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            cursor: move;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            white-space: nowrap;
            touch-action: none; /* Önemli: Sürükleme için */
        }

        /* --- Standart Tasarım --- */
        .player-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 15px; }
        .player-card { background: var(--card-bg); border-radius: 15px; padding: 20px; border: 1px solid #333; }
        .stats-container { display: flex; justify-content: space-around; background: #000; padding: 10px; border-radius: 10px; margin: 10px 0; }
        .stat-box span { font-size: 1.2rem; font-weight: bold; color: var(--neon-blue); display: block; text-align: center;}
        
        .section-box { max-width: 800px; margin: 20px auto; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .save-btn { position: fixed; bottom: 20px; right: 20px; background: var(--neon-orange); color: #000; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; z-index: 3000; box-shadow: 0 5px 15px rgba(255,102,0,0.4); }

        .master-controls { display: none; flex-direction: column; gap: 15px; max-width: 800px; margin: 10px auto; padding: 15px; background: #111; border-radius: 15px; }
        .input-group input { width: 90%; background: #222; border: 1px solid #444; color: white; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="admin-bar">
        <input type="password" id="passInput" placeholder="Kaptan Şifresi...">
        <button onclick="login()" style="background:var(--neon-orange); border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">GİRİŞ</button>
    </div>

    <header>
        <img src="badboysfc.jpg" alt="BAD BOYS FC" class="main-logo">
        <h1 style="color:var(--neon-orange); margin:5px 0; font-size: 1.5rem;">BAD BOYS FC</h1>
    </header>

    <div class="section-box">
        <h2 style="color:var(--gold); text-align:center; margin:0 0 15px 0; font-size: 1.2rem;">📋 TAKTİK SAHASI</h2>
        <p style="font-size: 0.7rem; text-align: center; color: #777;">(Oyuncuları parmağınla saha içine yerleştir)</p>
        <div class="pitch-container" id="pitch">
            <div class="penalty-area top-box"></div>
            <div class="center-circle"></div>
            <div class="penalty-area bottom-box"></div>
            <!-- Oyuncular JS ile buraya gelecek -->
        </div>
    </div>

    <div class="master-controls" id="panel">
        <div class="input-group">
            <h3 style="margin:0; color:var(--neon-blue);">⚽ Maç Kaydı</h3>
            <input type="text" id="opp" placeholder="Rakip İsmi">
            <input type="number" id="s1" placeholder="Biz">
            <input type="number" id="s2" placeholder="Rakip">
            <button onclick="addMatch()" style="background:var(--neon-orange); border:none; padding:10px; border-radius:5px; font-weight:bold; width:100%;">EKLE</button>
        </div>
    </div>

    <div class="player-grid" id="grid"></div>

    <div class="section-box">
        <h2 style="color:var(--neon-blue); text-align:center; margin-top:0;">🏟️ MAÇ GEÇMİŞİ</h2>
        <div id="matchHistory"></div>
    </div>

    <button class="save-btn" id="saveFab" onclick="finalSave()" style="display:none;">KAYDET</button>

<script>
    const players = [
        { name: "Hüseyin Yüksekdağ", role: "Kaleci", isGK: true },
        { name: "Süleyman Tunçelik", role: "Defans" },
        { name: "Mehmet Uzun", role: "Defans" },
        { name: "Yakup Sunay", role: "Kaptan" },
        { name: "Murat Çaylı", role: "Forvet" },
        { name: "Erol Gönül", role: "Orta Saha" },
        { name: "Eren Yılmaz", role: "Forvet" },
        { name: "Musa Aksu", role: "Forvet" }
    ];

    let stats = JSON.parse(localStorage.getItem('bb_v8_stats')) || players.map(() => ({ g: 0, a: 0, y: 0 }));
    let matches = JSON.parse(localStorage.getItem('bb_v8_matches')) || [];
    let isLogged = false;

    function login() {
        if(document.getElementById('passInput').value === "YakupS") {
            isLogged = true;
            document.getElementById('panel').style.display = 'flex';
            document.getElementById('saveFab').style.display = 'block';
            render();
            alert("Hoş geldin Kaptan Yakup!");
        } else { alert("Şifre hatalı!"); }
    }

    function render() {
        // İstatistik Kartları
        const g = document.getElementById('grid');
        g.innerHTML = '';
        players.forEach((p, i) => {
            g.innerHTML += `
                <div class="player-card">
                    <h3 style="margin:0; color:var(--neon-orange)">${p.name}</h3>
                    <div class="stats-container">
                        <div class="stat-box"><label>GOL</label><span>${stats[i].g}</span></div>
                        <div class="stat-box"><label>ASİST</label><span>${stats[i].a}</span></div>
                        ${p.isGK ? `<div class="stat-box"><label>YENEN</label><span>${stats[i].y}</span></div>` : ''}
                    </div>
                </div>`;
        });

        // Taktik Sahası Oyuncuları
        const pitch = document.getElementById('pitch');
        // Sadece çizgileri tut, eski oyuncuları temizle
        const oldPlayers = pitch.querySelectorAll('.draggable-player');
        oldPlayers.forEach(p => p.remove());

        players.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'draggable-player';
            div.innerText = p.name.split(' ')[0]; // Sadece isim
            div.style.left = (10 + (i * 5)) + "px";
            div.style.top = (20 + (i * 30)) + "px";
            
            // Sürükle Bırak Mantığı (Mobil & Masaüstü)
            initDrag(div);
            pitch.appendChild(div);
        });

        // Maç Geçmişi
        const hl = document.getElementById('matchHistory');
        hl.innerHTML = matches.slice().reverse().map(m => `
            <div style="background:#1a1a1a; padding:10px; border-radius:8px; margin-bottom:5px; display:flex; justify-content:space-between;">
                <span>${m.opp}</span><strong>${m.s1}-${m.s2}</strong>
            </div>
        `).join('');
    }

    function initDrag(el) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        
        el.onmousedown = dragMouseDown;
        el.ontouchstart = dragMouseDown;

        function dragMouseDown(e) {
            e = e || window.event;
            const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
            pos3 = clientX;
            pos4 = clientY;
            document.onmouseup = closeDragElement;
            document.ontouchend = closeDragElement;
            document.onmousemove = elementDrag;
            document.ontouchmove = elementDrag;
        }

        function elementDrag(e) {
            e = e || window.event;
            const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
            pos1 = pos3 - clientX;
            pos2 = pos4 - clientY;
            pos3 = clientX;
            pos4 = clientY;
            el.style.top = (el.offsetTop - pos2) + "px";
            el.style.left = (el.offsetLeft - pos1) + "px";
        }

        function closeDragElement() {
            document.onmouseup = null;
            document.ontouchend = null;
            document.onmousemove = null;
            document.ontouchmove = null;
        }
    }

    function addMatch() {
        const o = document.getElementById('opp').value, s1 = document.getElementById('s1').value, s2 = document.getElementById('s2').value;
        if(!o) return;
        matches.push({ opp: o, s1: s1, s2: s2 });
        render();
    }

    function finalSave() {
        localStorage.setItem('bb_v8_stats', JSON.stringify(stats));
        localStorage.setItem('bb_v8_matches', JSON.stringify(matches));
        alert("Kaydedildi!");
    }

    render();
</script>
</body>
</html>
