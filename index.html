<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD BOYS FC | İstatistik Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .orange-border { border-color: #ff6600; }
        .orange-bg { background-color: #ff6600; }
        .orange-text { color: #ff6600; }
        .card { background: #1a1a1a; border-left: 4px solid #ff6600; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="text-center mb-8">
        <h1 class="text-3xl font-extrabold orange-text uppercase tracking-widest">BAD BOYS FC</h1>
        <p class="text-gray-400 text-sm">Halı Saha İstatistik Takip Sistemi</p>
    </header>

    <section class="mb-8 p-4 border orange-border rounded-lg bg-zinc-900">
        <h2 class="text-lg font-bold mb-4 orange-text">Yeni Oyuncu Ekle</h2>
        <div class="grid grid-cols-2 gap-3">
            <input id="pName" type="text" placeholder="İsim Soyisim" class="bg-black border border-zinc-700 p-2 rounded text-sm">
            <select id="pRole" class="bg-black border border-zinc-700 p-2 rounded text-sm">
                <option value="Forvet">Forvet</option>
                <option value="Orta Saha">Orta Saha</option>
                <option value="Defans">Defans</option>
                <option value="Kaleci">Kaleci</option>
            </select>
            <button onclick="addPlayer()" class="col-span-2 orange-bg text-black font-bold p-2 rounded hover:bg-orange-500 transition">KADROYA EKLE</button>
        </div>
    </section>

    <div id="playerContainer" class="space-y-4">
        </div>

    <div class="fixed bottom-0 left-0 w-full bg-zinc-900 border-t orange-border p-4 flex justify-around text-xs font-bold uppercase">
        <div>Toplam Oyuncu: <span id="totalPlayers" class="orange-text">0</span></div>
        <div>Toplam Gol: <span id="totalGoals" class="orange-text">0</span></div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('badBoysFC')) || [];

        function save() {
            localStorage.setItem('badBoysFC', JSON.stringify(players));
            render();
        }

        function addPlayer() {
            const name = document.getElementById('pName').value;
            const role = document.getElementById('pRole').value;
            if(!name) return alert("İsim yazmalısın!");

            players.push({
                id: Date.now(),
                name: name,
                role: role,
                goals: 0,
                assists: 0,
                isCaptain: name.toLowerCase().includes("yakup")
            });
            
            document.getElementById('pName').value = "";
            save();
        }

        function deletePlayer(id) {
            if(confirm("Oyuncuyu silmek istediğine emin misin?")) {
                players = players.filter(p => p.id !== id);
                save();
            }
        }

        function updateStat(id, field, amount) {
            const player = players.find(p => p.id === id);
            player[field] = Math.max(0, player[field] + amount);
            save();
        }

        function render() {
            const container = document.getElementById('playerContainer');
            container.innerHTML = "";
            let tGoals = 0;

            players.forEach(p => {
                tGoals += p.goals;
                container.innerHTML += `
                    <div class="card p-4 rounded shadow-lg flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-lg">${p.name}</span>
                                ${p.isCaptain ? '<span class="bg-orange-600 text-black text-[10px] px-1 rounded font-black">C</span>' : ''}
                            </div>
                            <div class="text-xs text-gray-500 uppercase">${p.role}</div>
                            <div class="mt-2 flex gap-4 text-sm">
                                <span>⚽ Gol: <b class="orange-text">${p.goals}</b></span>
                                <span>🎯 Asist: <b class="orange-text">${p.assists}</b></span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <div class="flex gap-1">
                                <button onclick="updateStat(${p.id}, 'goals', 1)" class="bg-zinc-800 border border-zinc-700 px-2 rounded hover:bg-orange-900">+G</button>
                                <button onclick="updateStat(${p.id}, 'assists', 1)" class="bg-zinc-800 border border-zinc-700 px-2 rounded hover:bg-orange-900">+A</button>
                                <button onclick="deletePlayer(${p.id})" class="bg-red-900 px-2 rounded ml-2">🗑️</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('totalPlayers').innerText = players.length;
            document.getElementById('totalGoals').innerText = tGoals;
        }

        // İlk açılışta verileri yükle
        render();
    </script>
</body>
</html>
