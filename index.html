<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD BOYS FC | Resmi Web Sitesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .orange-text { color: #ff4500; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2a1100 0%, #000000 70%);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .enter-btn {
            font-family: 'Orbitron', sans-serif; background: #ff4500; color: black;
            padding: 12px 40px; font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.5); transition: all 0.3s ease;
            margin-top: 30px;
        }

        #main-content { opacity: 0; transform: translateY(30px); transition: 1s ease-out; visibility: hidden;}
        .show-content { opacity: 1 !important; transform: translateY(0) !important; visibility: visible !important;}

        .card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.3s; }
        
        .admin-only { display: none; }
        .admin-active .admin-only { display: flex; }

        /* Kilit Logosu - Belirgin Turuncu Çerçeve */
        .admin-lock-btn {
            position: absolute; right: 15px; top: 15px;
            border: 3px solid #ff4500; background: #000;
            padding: 8px; border-radius: 12px; color: #ff4500;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.3);
            transition: all 0.3s; z-index: 100;
        }
        .admin-active .admin-lock-btn { background: #ff4500; color: #000; }

        .marquee-container { background: #ff4500; color: black; padding: 6px 0; font-weight: 900; font-size: 11px; text-transform: uppercase; overflow: hidden; white-space: nowrap; border-bottom: 2px solid rgba(0,0,0,0.1); }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .pitch {
            background: #061806; border: 2px solid #1a4a1a; position: relative;
            height: 480px; border-radius: 10px; margin: 20px 0; overflow: hidden;
            background-image: linear-gradient(#1a4a1a 1px, transparent 1px), linear-gradient(90deg, #1a4a1a 1px, transparent 1px);
            background-size: 50% 100%; background-position: center;
        }
        .player-dot {
            position: absolute; min-width: 100px; padding: 5px 8px; background: #ff4500;
            color: black; font-size: 8px; font-weight: 900; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; text-align: center;
            border: 2px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            touch-action: none; user-select: none; z-index: 10; transform: translateX(-50%);
        }
        .admin-active .player-dot { cursor: move; }
        .market-value { color: #00ff00; font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 900; }
        .reset-btn { background: #330000; color: #ff3333; border: 1px solid #ff3333; width: 100%; padding: 12px; border-radius: 10px; font-size: 10px; font-weight: 900; margin-top: 40px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="badboysfc.jpg" alt="BAD BOYS Logo" class="max-w-[150px] mb-4">
        <button class="enter-btn" onclick="sahayaCik()">Sahaya Çık</button>
    </div>

    <div class="marquee-container sticky top-0 z-50">
        <div class="marquee-text italic">BAD BOYS FC • RESMİ WEB SİTESİ • KAPTAN YAKUP SUNAY • ASLA YALNIZ KOŞMAZSIN • BAD BOYS FC •</div>
    </div>

    <div id="main-content" class="container mx-auto max-w-md p-4 pb-24 relative">
        <button onclick="checkAdmin()" class="admin-lock-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </button>

        <header class="mb-8 mt-6 text-center">
            <h1 class="text-4xl font-black italic orange-text font-orbitron uppercase">BAD BOYS FC</h1>
            <p class="text-zinc-500 text-[9px] font-bold tracking-[0.3em] uppercase">Taktik - Skor - Racon</p>
        </header>

        <h2 class="text-xs font-black mb-2 text-zinc-400 uppercase tracking-widest pl-1">📋 Taktik Tahtası</h2>
        <div class="pitch" id="tacticalPitch"></div>

        <div class="card p-4 rounded-xl mb-10">
            <h2 class="text-xs font-black mb-4 text-zinc-400 uppercase tracking-widest">✅ Maç Yoklaması</h2>
            <div id="attendanceList" class="space-y-3"></div>
        </div>

        <h2 class="text-xs font-black mb-4 text-zinc-400 uppercase tracking-widest pl-1">👥 Kadro Verileri</h2>
        <div id="playerContainer" class="space-y-4"></div>

        <div class="mt-12 mb-10">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-black text-zinc-400 uppercase tracking-widest pl-1">📜 Maç Arşivi</h2>
                <button onclick="addMatchRecord()" class="admin-only text-[10px] orange-text font-bold border border-orange-900 px-2 py-1 rounded">+ MAÇ EKLE</button>
            </div>
            <div id="matchHistoryContainer" class="space-y-2"></div>
        </div>

        <button onclick="resetAllData()" class="admin-only reset-btn">⚠️ TÜM VERİLERİ SIFIRLA</button>
    </div>

    <script>
        const adminPassword = "badboys123";
        let isAdmin = false;

        const initialPlayers = [
            { id: 1, name: "HÜSEYİNCAN YÜKSEKDAĞ", isGK: true, value: "10.0M €", quote: "Kalede adeta kocaman bir fil gibi.", goals: 0, assists: 0, conceded: 0, attending: true, pos: { x: 50, y: 92 } },
            { id: 2, name: "SÜLEYMAN TUNÇELİK", value: "10.0M €", quote: "Defansın bel kemiği.", goals: 0, assists: 0, attending: true, pos: { x: 30, y: 75 } },
            { id: 3, name: "YAKUP SUNAY", value: "10.0M €", quote: "Her yerde olan koca yürekli kaptan.", goals: 0, assists: 0, attending: true, pos: { x: 70, y: 75 } },
            { id: 4, name: "MEHMET UZUN", value: "10.0M €", quote: "Takımın sert adamı.", goals: 0, assists: 0, attending: true, pos: { x: 50, y: 58 } },
            { id: 5, name: "EROL GÖNÜL", value: "10.0M €", quote: "Her yerden şut atmayı sever.", goals: 0, assists: 0, attending: true, pos: { x: 25, y: 40 } },
            { id: 6, name: "MURAT ÇAYLI", value: "10.0M €", quote: "Her alanda çalım deneyebiliyor.", goals: 0, assists: 0, attending: true, pos: { x: 75, y: 40 } },
            { id: 7, name: "EREN YILMAZ", value: "10.0M €", quote: "Maçı izlemeye eşi geldiyse geçmiş olsun diyoruz rakibe.", goals: 0, assists: 0, attending: true, pos: { x: 50, y: 25 } },
            { id: 8, name: "MUSA AKSU", value: "10.0M €", quote: "Kıvrak bilekleri ile dosta korku düşmana güven tarzı var.", goals: 0, assists: 0, attending: true, pos: { x: 50, y: 10 } }
        ];

        let players = JSON.parse(localStorage.getItem('badBoysData')) || initialPlayers;
        let matchRecords = JSON.parse(localStorage.getItem('badBoysMatches')) || [];

        function sahayaCik() {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-content').classList.add('show-content'); 
            }, 800);
        }

        function checkAdmin() {
            if(prompt("Şifre:") === adminPassword) {
                isAdmin = true;
                document.body.classList.add('admin-active');
                alert("Admin Modu Aktif: Artık skor ekleyebilir ve isimleri taşıyabilirsiniz.");
                render();
            }
        }

        function resetAllData() {
            if(confirm("Tüm veriler (skorlar, goller, diziliş) silinecek. Emin misin?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function setupDraggable() {
            const pitch = document.getElementById('tacticalPitch');
            document.querySelectorAll('.player-dot').forEach(dot => {
                const startDrag = (e) => { if(!isAdmin) return; activePlayer = dot; };
                dot.onmousedown = startDrag; dot.ontouchstart = startDrag;
            });

            const moveHandler = (clientX, clientY) => {
                if(!activePlayer || !isAdmin) return;
                const rect = pitch.getBoundingClientRect();
                let x = ((clientX - rect.left) / rect.width) * 100;
                let y = ((clientY - rect.top) / rect.height) * 100;
                x = Math.max(12, Math.min(88, x));
                y = Math.max(5, Math.min(94, y));
                activePlayer.style.left = x + '%'; activePlayer.style.top = y + '%';
                const p = players.find(p => p.id == activePlayer.getAttribute('data-id'));
                p.pos = { x, y };
            };

            document.onmousemove = (e) => moveHandler(e.clientX, e.clientY);
            document.ontouchmove = (e) => moveHandler(e.touches[0].clientX, e.touches[0].clientY);
            document.onmouseup = document.ontouchend = () => { if(activePlayer) { localStorage.setItem('badBoysData', JSON.stringify(players)); activePlayer = null; } };
        }

        function toggleAttendance(id, status) {
            players.find(x => x.id === id).attending = status;
            localStorage.setItem('badBoysData', JSON.stringify(players));
            render();
        }

        function updateStat(id, field, amount) {
            players.find(x => x.id === id)[field] += amount;
            localStorage.setItem('badBoysData', JSON.stringify(players));
            render();
        }

        function render() {
            const pitch = document.getElementById('tacticalPitch');
            pitch.innerHTML = '<div class="absolute top-50 left-50 transform -translate-x-1/2 -translate-y-1/2 w-20 h-20 border-2 border-zinc-900 rounded-full"></div>';
            players.forEach(p => { pitch.innerHTML += `<div class="player-dot" data-id="${p.id}" style="left:${p.pos.x}%; top:${p.pos.y}%">${p.name}</div>`; });

            const attendanceList = document.getElementById('attendanceList');
            attendanceList.innerHTML = players.map(p => `
                <div class="flex flex-col gap-2 bg-[#050505] p-3 rounded-lg border border-zinc-900">
                    <span class="text-[10px] font-bold ${p.attending ? 'text-white' : 'text-zinc-600'} uppercase">${p.name}</span>
                    <div class="flex gap-2">
                        <button onclick="toggleAttendance(${p.id}, true)" class="flex-1 text-[9px] py-2 rounded font-black border ${p.attending ? 'bg-green-600 border-green-500 text-black' : 'border-green-900 text-green-900'}">GELİYOR</button>
                        <button onclick="toggleAttendance(${p.id}, false)" class="flex-1 text-[9px] py-2 rounded font-black border ${!p.attending ? 'bg-red-600 border-red-500 text-white' : 'border-red-900 text-red-900'}">GELMİYOR</button>
                    </div>
                </div>
            `).join('');

            const playerContainer = document.getElementById('playerContainer');
            playerContainer.innerHTML = players.map(p => `
                <div class="card p-4 rounded-xl border-zinc-900">
                    <div class="flex justify-between items-start mb-2">
                        <div><h3 class="font-bold text-[11px] uppercase">${p.name} ${p.isGK ? '🧤' : ''}</h3><p class="market-value">${p.value}</p></div>
                        <div class="flex gap-3 text-[10px] font-black">
                            ${p.isGK ? `<div class="conceded-tag">YEDİĞİ GOL: ${p.conceded} <button onclick="updateStat(${p.id},'conceded',1)" class="admin-only bg-red-900 px-1 rounded text-white inline ml-1">+</button></div>` : 
                            `<div>⚽ ${p.goals} <button onclick="updateStat(${p.id},'goals',1)" class="admin-only bg-zinc-800 px-1 rounded inline ml-1">+</button></div>`}
                            <div>🎯 ${p.assists} <button onclick="updateStat(${p.id},'assists',1)" class="admin-only bg-zinc-800 px-1 rounded inline ml-1">+</button></div>
                        </div>
                    </div>
                    <p class="text-[9px] text-zinc-500 italic mt-1 border-t border-zinc-900 pt-2">"${p.quote}"</p>
                </div>
            `).join('');

            const historyContainer = document.getElementById('matchHistoryContainer');
            historyContainer.innerHTML = matchRecords.map(m => `
                <div class="card p-3 rounded-lg flex justify-between items-center border-l-4 ${m.result === 'W' ? 'border-l-green-500' : 'border-l-red-500'}">
                    <div class="flex flex-col"><span class="text-[8px] text-zinc-500">${m.date}</span><span class="text-[10px] font-black uppercase">VS ${m.opponent}</span></div>
                    <div class="text-lg font-black italic orange-text font-orbitron">${m.score}</div>
                </div>
            `).join('');
            setupDraggable();
        }

        function addMatchRecord() {
            const opp = prompt("Rakip?"); const scr = prompt("Skor (Örn: 10-5)?");
            if(opp && scr) {
                const res = parseInt(scr.split('-')[0]) > parseInt(scr.split('-')[1]) ? 'W' : 'L';
                matchRecords.unshift({ opponent: opp, score: scr, date: new Date().toLocaleDateString('tr-TR'), result: res });
                localStorage.setItem('badBoysMatches', JSON.stringify(matchRecords)); render();
            }
        }
        render();
    </script>
</body>
</html>
