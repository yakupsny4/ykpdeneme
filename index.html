<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizim Halı Saha Anıları ⚽</title>
    <style>
        :root {
            --green: #2ecc71;
            --dark-green: #27ae60;
            --night: #2c3e50;
            --gold: #f1c40f;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .match-card {
            background: white;
            max-width: 600px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 2px solid var(--green);
        }
        .header {
            background: var(--night);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .info-bar {
            background: #eee;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            font-size: 0.9rem;
            border-bottom: 1px solid #ddd;
        }
        .score-area {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            gap: 20px;
            background: linear-gradient(to bottom, #fff, #f9f9f9);
        }
        .score { font-size: 4rem; font-weight: 800; color: var(--night); }
        .team-label { font-weight: bold; text-transform: uppercase; color: var(--dark-green); }
        
        .details { padding: 20px; }
        .section-title { 
            border-left: 5px solid var(--green); 
            padding-left: 10px; 
            margin: 20px 0 10px;
            font-weight: bold;
        }
        .mom-box { 
            background: var(--gold); 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
        }
        .notes-area {
            width: 100%;
            height: 80px;
            border: 1px dashed #ccc;
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }
        .save-btn {
            background: var(--green);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .save-btn:hover { background: var(--dark-green); }
        
        @media print {
            .save-btn { display: none; } /* PDF alırken butonu gizler */
        }
    </style>
</head>
<body>

    <div class="match-card">
        <div class="header">
            <h2 style="margin:0">⚽ MAÇ GÜNLÜĞÜ</h2>
            <p style="margin:5px 0 0; opacity:0.8">Dostluk kazansın (ama biz yendik)</p>
        </div>

        <!-- Maç Bilgileri -->
        <div class="info-bar">
            <span>📅 <input type="date" id="matchDate"></span>
            <span>📍 <input type="text" placeholder="Saha Adı (Örn: Şampiyon Halı Saha)" id="pitchName"></span>
        </div>

        <!-- Skor -->
        <div class="score-area">
            <div style="text-align:right">
                <div class="team-label">Bizim Tayfa</div>
                <input type="number" value="0" id="scoreA" style="font-size:3rem; width:60px; text-align:center; border:none; background:none; font-weight:bold;">
            </div>
            <div style="font-size: 1.5rem; color:#ccc">-</div>
            <div style="text-align:left">
                <div class="team-label">Rakipler</div>
                <input type="number" value="0" id="scoreB" style="font-size:3rem; width:60px; text-align:center; border:none; background:none; font-weight:bold;">
            </div>
        </div>

        <div class="details">
            <!-- Kadrolar -->
            <div class="section-title">KADROLAR</div>
            <div style="display:flex; gap:10px;">
                <textarea placeholder="Bizimkiler (Virgülle ayır)" style="width:50%; height:60px; border-radius:5px; border:1px solid #ddd; padding:5px;" id="playersA"></textarea>
                <textarea placeholder="Onlar (Virgülle ayır)" style="width:50%; height:60px; border-radius:5px; border:1px solid #ddd; padding:5px;" id="playersB"></textarea>
            </div>

            <!-- Maçın Adamı -->
            <div class="section-title">🌟 MAÇIN ADAMI (MOM)</div>
            <div class="mom-box">
                <input type="text" placeholder="Kim parladı?" id="momName" style="background:transparent; border:none; text-align:center; width:100%; font-weight:bold; font-size:1.1rem; outline:none;">
            </div>

            <!-- Maç Notları -->
            <div class="section-title">📝 MAÇ GEYİKLERİ & NOTLAR</div>
            <textarea class="notes-area" placeholder="Örn: Ahmet'in boş kaleye kaçırdığı gol, Mehmet'in 30 metreden füzesi..." id="matchNotes"></textarea>
        </div>

        <button class="save-btn" onclick="saveMemory()">BU ANIYI KAYDET (PDF AL)</button>
    </div>

    <p style="margin-top:20px; font-size:0.8rem; color:#888;">* Sayfayı farklı kaydet diyerek veya ekran görüntüsü alarak saklayabilirsin.</p>

    <script>
        function saveMemory() {
            window.print(); // Sayfayı PDF olarak kaydetmek için en kolay yol
            alert("Maç anısı hazır! Bu sayfayı PDF olarak kaydedebilir veya ekran görüntüsü alabilirsin.");
        }
        
        // Bugünün tarihini otomatik seç
        document.getElementById('matchDate').valueAsDate = new Date();
    </script>

</body>
</html>
