<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD BOYS FC | ULTIMATE PORTAL</title>
    <style>
        :root {
            --neon-orange: #ff6600;
            --neon-blue: #00d4ff;
            --deep-black: #050505;
            --card-bg: rgba(25, 25, 25, 0.9);
            --gold: #ffd700;
        }

        body {
            background-color: var(--deep-black);
            color: #eeeeee;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-bottom: 100px;
        }

        /* --- Kaptan Paneli --- */
        .admin-bar {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-bottom: 2px solid var(--neon-orange);
            display: flex;
            justify-content: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .admin-bar input {
            background: #111;
            border: 1px solid var(--neon-orange);
            color: white;
            padding: 8px;
            border-radius: 5px;
            outline: none;
        }

        /* --- Header & Logo --- */
        header { text-align: center; padding: 40px 20px; }
        .main-logo {
            width: 180px;
            filter: drop-shadow(0 0 15px var(--neon-orange));
            border-radius: 20px;
            border: 3px solid var(--neon-orange);
        }

        /* --- Maç Kayıt Formu (Admin Özel) --- */
        .match-form {
            max-width: 600px;
            margin: 20px auto;
            background: #111;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed var(--neon-orange);
            display: none; /* Kaptan girişiyle açılır */
            flex-direction: column;
            gap: 10px;
        }

        .match-form input {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        /* --- Oyuncu Kartları --- */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .player-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            border: 1px solid #333;
            overflow: hidden;
            transition: 0.4s;
        }

        .smoke-bg {
            position: absolute;
            top: -20px; left: -20px;
            width: 150px; height: 100px;
            background: radial-gradient(circle, rgba(255,102,0,0.15) 0%, transparent 70%);
            filter: blur(20px);
            z-index: 0;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
        }

        .stat-box { text-align: center; }
        .stat-box span { display: block; font-size: 1.5rem; color: var(--neon-blue); font-weight: bold; }

        /* --- Maç Geçmişi --- */
        .match-history {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .match-card {
            background: #1a1a1a;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #444;
        }

        .win { border-left-color: #28a745; }
        .loss { border-left-color: #dc3545; }
        .draw { border-left-color: #ffc107; }

        /* --- Genel Tasarım Elemanları --- */
        .btn-circle { width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-plus { background: #28a745; }
        .btn-minus { background: #dc3545; }

        .save-fab {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--neon-orange); color: black;
            border: none; padding: 15px 30px; border-radius: 50px;
            font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--neon-orange);
            display: none; z-index: 3000;
        }

        .editor-tools { display: none; }

    </style>
</head>
<body>

    <div class="admin-bar">
        <input type="password" id="pass" placeholder="Kaptan Şifresi...">
        <button onclick="login()" style="background:var(--neon-orange); border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">GİRİŞ</button>
    </div>

    <header>
        <img src="badboysfc.jpg" alt="Logo" class="main-logo">
        <h1 style="color:var(--neon-orange); text-shadow: 0 0 15px rgba(255,102,0,0.5);">BAD BOYS FC</h1>
    </header>

    <!-- Maç Kayıt Alanı (Admin) -->
    <div class="match-form" id="matchForm">
        <h3 style="color:var(--neon-orange); margin:0;">Yeni Maç Kaydet</h3>
        <input type="text" id="oppName" placeholder="Rakip Takım Adı">
        <div style="display:flex; gap:10px;">
            <input type="number" id="ourScore" placeholder="Bizim Skor" style="flex:1">
            <input type="number" id="oppScore" placeholder="Rakip Skor" style="flex:1">
        </div>
        <button onclick="addMatch()" style="background:var(--neon-blue); border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;">MAÇI EKLE</button>
    </div>

    <!-- Oyuncular -->
    <div class="player-grid" id="playerGrid"></div>

    <!-- Maç Geçmişi -->
    <div class="match-history">
        <h2 style="color:var(--neon-blue); border-bottom: 1px solid #333; padding-bottom:10px;">MAÇ GEÇMİŞİ</h2>
        <div id="historyList"></div>
    </div>

    <button class="save-fab" id="saveFab" onclick="persistData()">VERİLERİ KAYDET</button>

<script>
    const players = [
        { name: "Hüseyin Yüksekdağ", role: "Kaleci", isGK: true },
        { name: "Süleyman Tunçelik", role: "Defans" },
        { name: "Mehmet Uzun", role: "Defans" },
        { name: "Yakup Sunay", role: "Kaptan" },
        { name: "Murat Çaylı", role: "Forvet" },
        { name: "Erol Gönül", role: "Orta Saha" },
        { name: "Eren Yılmaz", role: "Forvet" },
        { name: "Musa Aksu", role: "Forvet" }
    ];

    let stats = JSON.parse(localStorage.getItem('bb_stats_v4')) || players.map(() => ({ g: 0, a: 0, y: 0 }));
    let matches = JSON.parse(localStorage.getItem('bb_matches_v4')) || [];
    let isAdmin = false;

    function login() {
        if(document.getElementById('pass').value === "badboysfc1907") {
            isAdmin = true;
            document.querySelectorAll('.editor-tools').forEach(e => e.style.display = 'block');
            document.getElementById('matchForm').style.display = 'flex';
            document.getElementById('saveFab').style.display = 'block';
            render();
            alert("Sistem açıldı Kaptan!");
        } else { alert("Şifre Yanlış!"); }
    }

    function render() {
        const grid = document.getElementById('playerGrid');
        grid.innerHTML = '';
        players.forEach((p, i) => {
            grid.innerHTML += `
                <div class="player-card">
                    <div class="smoke-bg"></div>
                    <h2 style="margin:0; color:var(--neon-orange);">${p.name}</h2>
                    <small>${p.role}</small>
                    <div class="stats-row">
                        <div class="stat-box"><label>GOL</label><span id="g-${i}">${stats[i].g}</span></div>
                        <div class="stat-box"><label>ASİST</label><span id="a-${i}">${stats[i].a}</span></div>
                        ${p.isGK ? `<div class="stat-box"><label>YENEN</label><span id="y-${i}">${stats[i].y}</span></div>` : ''}
                    </div>
                    <div class="editor-tools" style="display:${isAdmin ? 'block' : 'none'}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <small>Gol: </small>
                            <div>
                                <button class="btn-circle btn-minus" onclick="upd(${i},'g',-1)">-</button>
                                <button class="btn-circle btn-plus" onclick="upd(${i},'g',1)">+</button>
                            </div>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <small>Asist: </small>
                            <div>
                                <button class="btn-circle btn-minus" onclick="upd(${i},'a',-1)">-</button>
                                <button class="btn-circle btn-plus" onclick="upd(${i},'a',1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        const hList = document.getElementById('historyList');
        hList.innerHTML = '';
        matches.slice().reverse().forEach((m, idx) => {
            let resClass = m.our > m.opp ? 'win' : (m.our < m.opp ? 'loss' : 'draw');
            hList.innerHTML += `
                <div class="match-card ${resClass}">
                    <div>
                        <strong style="color:var(--neon-orange)">${m.opp}</strong><br>
                        <small style="color:#666">${m.date}</small>
                    </div>
                    <div style="font-size:1.5rem; font-weight:bold;">
                        ${m.our} - ${m.oppScore} 
                    </div>
                </div>`;
        });
    }

    function upd(idx, key, val) {
        stats[idx][key] += val;
        if(stats[idx][key] < 0) stats[idx][key] = 0;
        document.getElementById(`${key}-${idx}`).innerText = stats[idx][key];
    }

    function addMatch() {
        const opp = document.getElementById('oppName').value;
        const our = parseInt(document.getElementById('ourScore').value);
        const oppS = parseInt(document.getElementById('oppScore').value);

        if(!opp || isNaN(our) || isNaN(oppS)) return alert("Tüm alanları doldur!");

        const newMatch = {
            opp: opp,
            our: our,
            oppScore: oppS,
            date: new Date().toLocaleDateString('tr-TR')
        };

        matches.push(newMatch);
        render();
        alert("Maç eklendi, kaydetmeyi unutma!");
    }

    function persistData() {
        localStorage.setItem('bb_stats_v4', JSON.stringify(stats));
        localStorage.setItem('bb_matches_v4', JSON.stringify(matches));
        alert("Kaptan, tüm veriler hafızaya kazındı!");
    }

    render();
</script>
</body>
</html>
