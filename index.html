<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD BOYS FC | İstatistik Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .orange-text { color: #ff4500; }
        .orange-bg { background-color: #ff4500; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2a1100 0%, #000000 70%);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .splash-logo {
            width: 280px; filter: drop-shadow(0 0 25px rgba(255, 69, 0, 0.7));
            margin-bottom: 3rem; animation: logoPulse 2s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 69, 0, 0.6)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 35px rgba(255, 69, 0, 0.9)); }
        }

        .enter-btn {
            font-family: 'Orbitron', sans-serif; background: #ff4500; color: black;
            padding: 15px 50px; font-weight: 900; letter-spacing: 3px;
            text-transform: uppercase; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.5); transition: all 0.3s ease;
        }

        .enter-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 30px rgba(255, 69, 0, 0.8); }

        #main-content { opacity: 0; transform: translateY(30px); transition: 1s ease-out; visibility: hidden;}
        .show-content { opacity: 1 !important; transform: translateY(0) !important; visibility: visible !important;}

        .card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); border-color: #333; }
        .mvp-card { background: linear-gradient(135deg, #ff4500 0%, #b33000 100%); border: none; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="splash-logo text-6xl font-black italic orange-text text-center font-orbitron">BAD BOYS<br>FC</h1>
        <button class="enter-btn" onclick="sahayaCik()">Sahaya Çık</button>
    </div>

    <div id="main-content" class="container mx-auto max-w-md p-4 pb-24">
        <header class="mb-8 mt-4 text-center">
            <h1 class="text-5xl font-black italic orange-text tracking-tighter font-orbitron">BAD BOYS FC</h1>
            <p class="text-zinc-500 text-[11px] font-bold tracking-[0.4em] uppercase mt-1">Resmi İstatistik Portalı</p>
        </header>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="card p-4 rounded-xl text-center">
                <div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">Kadro</div>
                <div id="playerCount" class="text-2xl font-black italic font-orbitron">0/8</div>
            </div>
            <div class="card p-4 rounded-xl text-center border-b-4 border-b-orange-600">
                <div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">Toplam Gol</div>
                <div id="totalGoals" class="text-2xl font-black italic orange-text font-orbitron">0</div>
            </div>
            <div class="card p-4 rounded-xl text-center">
                <div class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">Değer</div>
                <div id="totalValue" class="text-2xl font-black italic font-orbitron">€0M</div>
            </div>
        </div>

        <h2 class="text-xs font-black mb-4 text-zinc-400 uppercase tracking-widest pl-1">Haftanın Yıldızları</h2>
        <div id="mvpContainer" class="space-y-4 mb-10"></div>

        <h2 class="text-xs font-black mb-4 text-zinc-400 uppercase tracking-widest pl-1">Tüm Oyuncular</h2>
        <div id="playerContainer" class="space-y-4"></div>

        <div class="mt-12 text-center">
            <button onclick="resetAllData()" class="text-[10px] text-zinc-700 font-bold hover:text-red-500 transition uppercase tracking-widest">Sezonu Sıfırla (Kaptan)</button>
        </div>
    </div>

    <script>
        function sahayaCik() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            splash.style.opacity = '0';
            splash.style.visibility = 'hidden';
            setTimeout(() => { main.classList.add('show-content'); }, 300);
        }

        const initialPlayers = [
            { id: 1, name: "HÜSEYİN", role: "KALECİ", goals: 0, assists: 0, value: 5000000, isCaptain: false, lastTrend: 0 },
            { id: 2, name: "SÜLEYMAN", role: "DEFANS", goals: 0, assists: 0, value: 6500000, isCaptain: false, lastTrend: 0 },
            { id: 3, name: "YAKUP", role: "DEFANS", goals: 0, assists: 0, value: 8000000, isCaptain: true, lastTrend: 0 },
            { id: 4, name: "MEHMET", role: "DEFANS", goals: 0, assists: 0, value: 6000000, isCaptain: false, lastTrend: 0 },
            { id: 5, name: "EROL", role: "ORTA SAHA", goals: 0, assists: 0, value: 9000000, isCaptain: false, lastTrend: 0 },
            { id: 6, name: "EREN", role: "FORVET", goals: 0, assists: 0, value: 12000000, isCaptain: false, lastTrend: 0 },
            { id: 7, name: "MURAT", role: "FORVET", goals: 0, assists: 0, value: 11000000, isCaptain: false, lastTrend: 0 },
            { id: 8, name: "MUSA", role: "FORVET", goals: 0, assists: 0, value: 10500000, isCaptain: false, lastTrend: 0 }
        ];

        let players = JSON.parse(localStorage.getItem('badBoysData')) || initialPlayers;

        function save() {
            localStorage.setItem('badBoysData', JSON.stringify(players));
            render();
        }

        function updateStat(id, field, amount) {
            const p = players.find(x => x.id === id);
            p[field] = Math.max(0, p[field] + amount);
            p.value += (field === 'goals' ? 500000 : 250000) * amount;
            p.lastTrend = amount; 
            save();
        }

        function resetAllData() {
            if(confirm("Tüm istatistikler sıfırlanacak. Yeni sezona hazır mısın Kaptan?")) {
                players = initialPlayers.map(p => ({...p}));
                localStorage.removeItem('badBoysData');
                render();
            }
        }

        function render() {
            const container = document.getElementById('playerContainer');
            const mvpContainer = document.getElementById('mvpContainer');
            container.innerHTML = "";
            mvpContainer.innerHTML = "";
            let tGoals = 0, tValue = 0;

            const sortedPlayers = [...players].sort((a,b) => b.value - a.value);
            const topPlayers = sortedPlayers.slice(0, 2); 

            topPlayers.forEach(p => {
                mvpContainer.innerHTML += `
                    <div class="mvp-card p-5 rounded-2xl flex justify-between items-center relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 text-5xl opacity-10 font-black italic font-orbitron">STAR</div>
                        <div>
                            <div class="text-[9px] bg-white text-black px-2.5 py-1 rounded-full font-black w-fit mb-2 uppercase tracking-tighter">🔥 Formda</div>
                            <div class="font-black text-2xl italic uppercase font-orbitron">${p.name}</div>
                            <div class="text-[11px] font-bold text-zinc-100 italic">€${(p.value/1000000).toFixed(1)}M Değer</div>
                        </div>
                    </div>
                `;
            });

            sortedPlayers.forEach(p => {
                tGoals += p.goals; tValue += p.value;
                const trendIcon = p.lastTrend > 0 ? '<span class="text-green-500 text-xs">▲</span>' : (p.lastTrend < 0 ? '<span class="text-red-500 text-xs">▼</span>' : '<span class="text-zinc-800 text-xs">●</span>');
                
                container.innerHTML += `
                    <div class="card p-5 rounded-xl">
                        <div class="flex justify-between items-center">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="font-bold text-lg italic uppercase">${p.name}</span>
                                    ${p.isCaptain ? '<span class="orange-bg text-black text-[9px] px-1.5 py-0.5 rounded font-black">CPT</span>' : ''}
                                    ${trendIcon}
                                </div>
                                <div class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-3">${p.role}</div>
                                <div class="flex gap-4 text-xs font-bold items-center">
                                    <div class="flex items-center gap-2">
                                        <span>⚽ ${p.goals}</span>
                                        <button onclick="updateStat(${p.id}, 'goals', 1)" class="w-6 h-6 bg-zinc-800 rounded text-[10px] hover:bg-orange-600 transition">+</button>
                                    </div>
                                    <div class="flex items-center gap-2 border-l border-zinc-800 pl-4">
                                        <span>🎯 ${p.assists}</span>
                                        <button onclick="updateStat(${p.id}, 'assists', 1)" class="w-6 h-6 bg-zinc-800 rounded text-[10px] hover:bg-orange-600 transition">+</button>
                                    </div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-lg font-black orange-text font-orbitron">€${(p.value/1000000).toFixed(1)}M</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('totalValue').innerText = `€${(tValue/1000000).toFixed(1)}M`;
            document.getElementById('totalGoals').innerText = tGoals;
            document.getElementById('playerCount').innerText = `${players.length}/8`;
        }
        render();
    </script>
</body>
</html>
