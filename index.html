<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Halısaha Ligi</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
padding:20px;
}

h1{
color:#ffd000;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
}

button{
background:#ffd000;
border:none;
padding:10px 15px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

input{
padding:8px;
margin:5px;
}

.card{
background:#1c1c1c;
padding:15px;
margin:10px;
border-radius:10px;
display:inline-block;
width:220px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#ffd000;
color:black;
padding:10px;
}

td{
border-bottom:1px solid #333;
padding:8px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ Halısaha Ligi</h1>

<h2>Oyuncu Ekle</h2>

<input id="isim" placeholder="İsim">
<input id="yas" placeholder="Yaş">
<input id="boy" placeholder="Boy">
<input id="kilo" placeholder="Kilo">
<input id="deger" placeholder="Piyasa Değeri">
<input id="resim" placeholder="Resim URL">

<button onclick="oyuncuEkle()">Oyuncu Ekle</button>

<h2>Oyuncular</h2>

<div id="oyuncular"></div>

<h2>Puan Tablosu</h2>

<table>
<thead>
<tr>
<th>İsim</th>
<th>Maç</th>
<th>Gol</th>
<th>Asist</th>
<th>MVP</th>
<th>Puan</th>
</tr>
</thead>

<tbody id="puanTablo"></tbody>

</table>

<h2>Kadro Oluştur</h2>

<button onclick="kadroOlustur()">Yapay Zeka Kadro Kur</button>

<div id="takimlar"></div>

</div>

<script>

let oyuncular = []

function puanHesapla(o){

return (o.gol*4)+(o.asist*3)+(o.mvp*5)+(o.mac*1)

}

function oyuncuEkle(){

let oyuncu={

isim:document.getElementById("isim").value,
yas:document.getElementById("yas").value,
boy:document.getElementById("boy").value,
kilo:document.getElementById("kilo").value,
deger:document.getElementById("deger").value,
resim:document.getElementById("resim").value,

gol:0,
asist:0,
mvp:0,
mac:0,
puan:0

}

oyuncular.push(oyuncu)

goster()

}

function goster(){

let alan=document.getElementById("oyuncular")

alan.innerHTML=""

oyuncular.forEach((o,i)=>{

o.puan=puanHesapla(o)

alan.innerHTML+=`

<div class="card">

<img src="${o.resim}">

<h3>${o.isim}</h3>

<p>Yaş: ${o.yas}</p>
<p>Boy: ${o.boy}</p>
<p>Kilo: ${o.kilo}</p>
<p>Değer: ${o.deger}</p>

<button onclick="gol(${i})">Gol</button>
<button onclick="asist(${i})">Asist</button>
<button onclick="mvp(${i})">MVP</button>
<button onclick="mac(${i})">Maç</button>

</div>

`

})

puanTablo()

}

function gol(i){
oyuncular[i].gol++
goster()
}

function asist(i){
oyuncular[i].asist++
goster()
}

function mvp(i){
oyuncular[i].mvp++
goster()
}

function mac(i){
oyuncular[i].mac++
goster()
}

function puanTablo(){

let tablo=document.getElementById("puanTablo")

tablo.innerHTML=""

oyuncular.sort((a,b)=>b.puan-a.puan)

oyuncular.forEach(o=>{

tablo.innerHTML+=`

<tr>

<td>${o.isim}</td>
<td>${o.mac}</td>
<td>${o.gol}</td>
<td>${o.asist}</td>
<td>${o.mvp}</td>
<td>${o.puan}</td>

</tr>

`

})

}

function kadroOlustur(){

let karisik=[...oyuncular].sort(()=>Math.random()-0.5)

let yarisi=Math.ceil(karisik.length/2)

let takim1=karisik.slice(0,yarisi)
let takim2=karisik.slice(yarisi)

let alan=document.getElementById("takimlar")

alan.innerHTML=`

<h3>Sarı Takım</h3>
${takim1.map(o=>o.isim).join("<br>")}

<h3>Siyah Takım</h3>
${takim2.map(o=>o.isim).join("<br>")}

`

}

</script>

</body>
</html>
