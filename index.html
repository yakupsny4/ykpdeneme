<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAD BOYS FC | ULTIMATE V10</title>
    <style>
        :root {
            --neon-orange: #ff6600;
            --neon-blue: #00d4ff;
            --deep-black: #050505;
            --card-bg: rgba(20, 20, 20, 0.95);
            --gold: #ffd700;
            --pitch-green: #1a3a1a;
        }

        body {
            background-color: var(--deep-black);
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding-bottom: 120px;
        }

        /* --- Admin --- */
        .admin-bar {
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-bottom: 2px solid var(--neon-orange);
            display: flex; justify-content: center; gap: 15px;
            position: sticky; top: 0; z-index: 2000; backdrop-filter: blur(10px);
        }
        .admin-bar input { background: #111; border: 1px solid var(--neon-orange); color: white; padding: 8px; border-radius: 5px; outline: none; }

        header { text-align: center; padding: 30px; }
        .main-logo { width: 140px; border: 3px solid var(--neon-orange); border-radius: 15px; box-shadow: 0 0 20px rgba(255,102,0,0.4); }

        /* --- Taktik Sahası --- */
        .pitch-container {
            width: 95%; max-width: 500px; aspect-ratio: 2/3;
            background: var(--pitch-green);
            margin: 20px auto;
            border: 3px solid #fff;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            background-image: linear-gradient(rgba(255,255,255,0.05) 50%, transparent 50%);
            background-size: 100% 20%;
        }
        .center-circle { width: 80px; height: 80px; border: 2px solid #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); position: absolute; }
        .penalty-area { width: 60%; height: 15%; border: 2px solid #fff; position: absolute; left: 20%; }
        .top-box { top: 0; border-top: none; }
        .bottom-box { bottom: 0; border-bottom: none; }
        
        .draggable-player {
            position: absolute; background: var(--neon-orange); color: #000;
            padding: 5px 12px; border-radius: 15px; font-size: 11px; font-weight: bold;
            cursor: move; z-index: 100; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            touch-action: none; white-space: nowrap;
        }
        .is-captain { background: var(--gold) !important; border: 2px solid #fff; box-shadow: 0 0 15px var(--gold) !important; }
        .captain-badge { background: #000; color: var(--gold); padding: 1px 5px; border-radius: 3px; font-size: 10px; margin-right: 8px; border: 1px solid var(--gold); }

        /* --- Master Panel --- */
        .master-controls {
            max-width: 800px; margin: 20px auto; background: #111; padding: 25px;
            border-radius: 20px; border: 2px dashed #444; display: none; flex-direction: column; gap: 20px;
        }
        .input-group { display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .input-group input, .input-group select { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; }

        /* --- Kartlar & Statlar --- */
        .player-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 20px; }
        .player-card { background: var(--card-bg); border-radius: 20px; padding: 25px; position: relative; border: 1px solid #333; }
        .player-header h3 { margin: 0; color: var(--neon-orange); text-transform: uppercase; display: flex; align-items: center; }
        .player-header p { font-style: italic; color: #888; font-size: 0.85rem; margin: 10px 0; }
        .stats-container { display: flex; justify-content: space-around; background: #000; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .stat-box span { font-size: 1.5rem; font-weight: bold; color: var(--neon-blue); display: block; text-align: center;}
        .stat-box label { font-size: 0.65rem; color: #666; display: block; text-align: center;}

        .edit-row { display: none; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 5px 10px; border-radius: 8px; margin-bottom: 5px; }
        .btn-control { width: 30px; height: 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .plus { background: #28a745; } .minus { background: #dc3545; }

        /* --- Listeler --- */
        .section-box { max-width: 800px; margin: 40px auto; background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; }
        .att-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .att-btns button { background: #222; border: none; color: #444; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .att-btns button.active { color: white; box-shadow: 0 0 10px currentColor; }
        .geliyor.active { background: #28a745 !important; } .yok.active { background: #dc3545 !important; } .belki.active { background: #ffc107 !important; color: black !important; }
        .mvp-item { background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .save-btn { position: fixed; bottom: 30px; right: 30px; background: var(--neon-orange); color: black; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--neon-orange); display: none; z-index: 3000; }
        .reset-btn { background: transparent; border: 1px solid #dc3545; color: #dc3545; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="admin-bar">
        <input type="password" id="passInput" placeholder="Kaptan Şifresi...">
        <button onclick="login()" style="background:var(--neon-orange); border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">GİRİŞ</button>
    </div>

    <header>
        <img src="badboysfc.jpg" alt="BAD BOYS FC" class="main-logo">
        <h1 style="color:var(--neon-orange); margin:10px 0;">BAD BOYS FC</h1>
    </header>

    <!-- TAKTİK SAHASI -->
    <div class="section-box">
        <h2 style="color:var(--gold); text-align:center; margin-top:0;">📋 TAKTİK TAHTASI</h2>
        <div class="pitch-container" id="pitch">
            <div class="penalty-area top-box"></div>
            <div class="center-circle"></div>
            <div class="penalty-area bottom-box"></div>
        </div>
    </div>

    <!-- MASTER PANEL -->
    <div class="master-controls" id="panel">
        <div class="input-group">
            <h3 style="margin:0; color:var(--neon-blue);">⚽ Maç Kaydı</h3>
            <input type="text" id="opp" placeholder="Rakip İsmi">
            <div style="display:flex; gap:10px;">
                <input type="number" id="s1" placeholder="Biz" style="flex:1">
                <input type="number" id="s2" placeholder="Rakip" style="flex:1">
            </div>
            <button onclick="addMatch()" style="background:var(--neon-orange); border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">MAÇI EKLE</button>
        </div>

        <div class="input-group">
            <h3 style="margin:0; color:var(--gold);">🏆 MVP Oylama Sonucu</h3>
            <select id="mvpSelect"></select>
            <input type="text" id="mvpNote" placeholder="Not (Örn: Hat-trick)">
            <button onclick="addMvp()" style="background:var(--gold); color:black; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">MVP KAYDET</button>
        </div>
        <button class="reset-btn" onclick="fullReset()">SEZONU SIFIRLA (HER ŞEY SİLİNİR)</button>
    </div>

    <!-- OYUNCU GRİDİ -->
    <div class="player-grid" id="grid"></div>

    <!-- MVP KÜRSÜSÜ -->
    <div class="section-box">
        <h2 style="color:var(--gold); text-align:center; margin-top:0;">🏆 MVP KÜRSÜSÜ</h2>
        <div id="mvpList"></div>
    </div>

    <!-- YOKLAMA -->
    <div class="section-box">
        <h2 style="color:var(--neon-blue); text-align:center; margin-top:0;">📋 MAÇ YOKLAMASI</h2>
        <div id="attList"></div>
    </div>

    <!-- MAÇ GEÇMİŞİ -->
    <div class="section-box">
        <h2 style="color:var(--neon-blue); margin-top:0;">🏟️ MAÇ GEÇMİŞİ</h2>
        <div id="matchHistory"></div>
    </div>

    <button class="save-btn" id="saveFab" onclick="finalSave()">DEĞİŞİKLİKLERİ KAYDET</button>

<script>
    const players = [
        { name: "Hüseyin Yüksekdağ", role: "Kaleci", desc: "Kalede o varsa sırtımız sağlam", isGK: true },
        { name: "Süleyman Tunçelik", role: "Defans", desc: "Defansın her alanına sorgusuzca geçer" },
        { name: "Mehmet Uzun", role: "Defans", desc: "Takımın sert adamı" },
        { name: "Yakup Sunay", role: "Kaptan", desc: "Her bölgeye yetişen koca bir kaptan", isCaptain: true },
        { name: "Murat Çaylı", role: "Forvet", desc: "Akrobatik hareketler ve çalım atmayı seviyor" },
        { name: "Erol Gönül", role: "Orta Saha", desc: "Her yerden şut çekiyor sonra da nie koşmadın der" },
        { name: "Eren Yılmaz", role: "Forvet", desc: "Eşi o maçı izlemeye geldiyse rakibe geçmiş olsun" },
        { name: "Musa Aksu", role: "Forvet", desc: "Kıvrak bilekleri ile rakibe güven dosta korku veriyor" }
    ];

    let stats = JSON.parse(localStorage.getItem('bb_v10_stats')) || players.map(() => ({ g: 0, a: 0, y: 0 }));
    let matches = JSON.parse(localStorage.getItem('bb_v10_matches')) || [];
    let att = JSON.parse(localStorage.getItem('bb_v10_att')) || Array(8).fill(null);
    let mvps = JSON.parse(localStorage.getItem('bb_v10_mvps')) || [];
    let positions = JSON.parse(localStorage.getItem('bb_v10_pos')) || players.map((p, i) => ({ x: 10, y: 10 + (i * 35) }));
    
    let isLogged = false;

    function login() {
        if(document.getElementById('passInput').value === "YakupS") {
            isLogged = true;
            document.getElementById('panel').style.display = 'flex';
            document.getElementById('saveFab').style.display = 'block';
            const sel = document.getElementById('mvpSelect');
            sel.innerHTML = players.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            render();
            alert("Hoş geldin Kaptan Yakup!");
        } else { alert("Şifre yanlış!"); }
    }

    function render() {
        // Oyuncu Kartları (Verdiklerin Aynen Korundu)
        const g = document.getElementById('grid');
        g.innerHTML = '';
        players.forEach((p, i) => {
            g.innerHTML += `
                <div class="player-card" style="${p.isCaptain ? 'border-color: var(--gold)' : ''}">
                    <div class="player-header">
                        <h3>${p.isCaptain ? '<span class="captain-badge">C</span>' : ''}${p.name}</h3>
                        <small>${p.role}</small>
                        <p>"${p.desc}"</p>
                    </div>
                    <div class="stats-container">
                        <div class="stat-box"><label>GOL</label><span>${stats[i].g}</span></div>
                        <div class="stat-box"><label>ASİST</label><span>${stats[i].a}</span></div>
                        ${p.isGK ? `<div class="stat-box"><label>YENEN</label><span>${stats[i].y}</span></div>` : ''}
                    </div>
                    <div class="edit-row" style="display:${isLogged ? 'flex' : 'none'}"><small>GOL</small><button class="btn-control minus" onclick="upd(${i},'g',-1)">-</button><button class="btn-control plus" onclick="upd(${i},'g',1)">+</button></div>
                    <div class="edit-row" style="display:${isLogged ? 'flex' : 'none'}"><small>ASİST</small><button class="btn-control minus" onclick="upd(${i},'a',-1)">-</button><button class="btn-control plus" onclick="upd(${i},'a',1)">+</button></div>
                    ${p.isGK ? `<div class="edit-row" style="display:${isLogged ? 'flex' : 'none'}"><small>YENEN</small><button class="btn-control minus" onclick="upd(${i},'y',-1)">-</button><button class="btn-control plus" onclick="upd(${i},'y',1)">+</button></div>` : ''}
                </div>`;
        });

        // Taktik Sahası ve Konumlar
        const pitch = document.getElementById('pitch');
        pitch.querySelectorAll('.draggable-player').forEach(o => o.remove());
        players.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = `draggable-player ${p.isCaptain ? 'is-captain' : ''}`;
            div.innerHTML = (p.isCaptain ? '<b>(C) </b>' : '') + p.name.split(' ')[0];
            div.style.left = positions[i].x + "px";
            div.style.top = positions[i].y + "px";
            div.dataset.index = i;
            initDrag(div);
            pitch.appendChild(div);
        });

        // Diğer Listeler (Yoklama, MVP, Maçlar - Verdiklerin Aynen Korundu)
        document.getElementById('mvpList').innerHTML = mvps.slice().reverse().map(m => `<div class="mvp-item"><div><strong>${m.player}</strong><br><small>${m.date}</small></div><div>"${m.note}"</div></div>`).join('');
        
        document.getElementById('attList').innerHTML = players.map((p, i) => `
            <div class="att-row">
                <span>${p.name}</span>
                <div class="att-btns">
                    <button class="geliyor ${att[i]==='g'?'active':''}" onclick="setAtt(${i},'g')">Geliyor</button>
                    <button class="yok ${att[i]==='n'?'active':''}" onclick="setAtt(${i},'n')">Yok</button>
                    <button class="belki ${att[i]==='b'?'active':''}" onclick="setAtt(${i},'b')">Belki</button>
                </div>
            </div>`).join('');

        document.getElementById('matchHistory').innerHTML = matches.slice().reverse().map(m => `<div style="background:#1a1a1a; padding:12px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between;"><div><small>${m.date}</small><br><span>${m.opp}</span></div><strong>${m.s1}-${m.s2}</strong></div>`).join('');
    }

    function initDrag(el) {
        let p1=0, p2=0, p3=0, p4=0;
        el.onmousedown = dragStart; el.ontouchstart = dragStart;
        function dragStart(e) {
            const cx = e.type==="touchstart"?e.touches[0].clientX:e.clientX;
            const cy = e.type==="touchstart"?e.touches[0].clientY:e.clientY;
            p3=cx; p4=cy;
            document.onmouseup=stop; document.ontouchend=stop;
            document.onmousemove=move; document.ontouchmove=move;
        }
        function move(e) {
            const cx = e.type==="touchmove"?e.touches[0].clientX:e.clientX;
            const cy = e.type==="touchmove"?e.touches[0].clientY:e.clientY;
            p1=p3-cx; p2=p4-cy; p3=cx; p4=cy;
            let nL = el.offsetLeft-p1; let nT = el.offsetTop-p2;
            el.style.left=nL+"px"; el.style.top=nT+"px";
            positions[el.dataset.index] = { x: nL, y: nT };
        }
        function stop() { document.onmouseup=null; document.ontouchend=null; document.onmousemove=null; document.ontouchmove=null; }
    }

    function upd(idx, k, v) { stats[idx][k] += v; if(stats[idx][k] < 0) stats[idx][k] = 0; render(); }
    function setAtt(i, v) { att[i] = v; render(); }

    function addMatch() {
        const o = document.getElementById('opp').value, s1 = document.getElementById('s1').value, s2 = document.getElementById('s2').value;
        if(!o || s1==="" || s2==="") return alert("Boş bırakma!");
        matches.push({ opp: o, s1: s1, s2: s2, date: new Date().toLocaleDateString('tr-TR') });
        render();
    }

    function addMvp() {
        const p = document.getElementById('mvpSelect').value, n = document.getElementById('mvpNote').value;
        mvps.push({ player: p, note: n || "Maçın adamı!", date: new Date().toLocaleDateString('tr-TR') });
        render();
    }

    function finalSave() {
        localStorage.setItem('bb_v10_stats', JSON.stringify(stats));
        localStorage.setItem('bb_v10_matches', JSON.stringify(matches));
        localStorage.setItem('bb_v10_att', JSON.stringify(att));
        localStorage.setItem('bb_v10_mvps', JSON.stringify(mvps));
        localStorage.setItem('bb_v10_pos', JSON.stringify(positions));
        alert("Kaptan; Tüm veriler ve saha dizilişi kaydedildi!");
    }

    function fullReset() { if(confirm("DİKKAT: Her şey silinecek! Emin misin?")) { localStorage.clear(); location.reload(); } }

    render();
</script>
</body>
</html>
