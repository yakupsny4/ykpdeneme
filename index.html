<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD BOYS FC | Pro Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .orange-text { color: #ff4500; }
        .orange-bg { background-color: #ff4500; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2a1100 0%, #000000 70%);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .enter-btn {
            font-family: 'Orbitron', sans-serif; background: #ff4500; color: black;
            padding: 15px 50px; font-weight: 900; letter-spacing: 3px;
            text-transform: uppercase; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.5); transition: all 0.3s ease;
        }

        #main-content { opacity: 0; transform: translateY(30px); transition: 1s ease-out; visibility: hidden;}
        .show-content { opacity: 1 !important; transform: translateY(0) !important; visibility: visible !important;}

        .card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.3s; }
        .card:hover { border-color: #ff4500; }
        .mvp-card { background: linear-gradient(135deg, #ff4500 0%, #b33000 100%); border: none; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        .admin-only { display: none; }
        .admin-active .admin-only { display: flex; }

        .player-note { color: #ff4500; font-style: italic; font-size: 11px; margin-top: 2px; display: block; opacity: 0.9; }
        
        /* Yeni Eklenen Stiller */
        .stat-bar { height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .stat-fill { height: 100%; background: #ff4500; transition: width 0.5s ease-out; }
        .quote-card { border-left: 3px solid #ff4500; background: #080808; position: relative; }
    </style>
</head>
<body>

    <audio id="goalCelebration" preload="auto">
        <source src="https://actions.google.com/sounds/v1/crowds/crowd_cheer.ogg" type="audio/ogg">
        <source src="https://www.soundjay.com/misc/sounds/stadium-cheer-1.mp3" type="audio/mpeg">
    </audio>

    <div id="splash-screen">
        <h1 class="text-6xl font-black italic orange-text text-center font-orbitron mb-12">BAD BOYS<br>FC</h1>
        <button class="enter-btn" onclick="sahayaCik()">Sahaya Çık</button>
    </div>

    <div id="main-content" class="container mx-auto max-w-md p-4 pb-24 relative">
        <button onclick="checkAdmin()" class="absolute right-4 top-4 text-zinc-800 hover:text-orange-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </button>

        <header class="mb-8 mt-4 text-center">
            <h1 class="text-5xl font-black italic orange-text tracking-tighter font-orbitron">BAD BOYS FC</h1>
            <p class="text-zinc-500 text-[11px] font-bold tracking-[0.4em] uppercase mt-1">Resmi İstatistik Portalı</p>
        </header>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="card p-4 rounded-xl text-center">
                <div class="text-[9px] text-zinc-500 uppercase font-black">Kadro</div>
                <div id="playerCount" class="text-2xl font-black italic font-orbitron">8/8</div>
            </div>
            <div class="card p-4 rounded-xl text-center border-b-4 border-b-orange-600">
                <div class="text-[9px] text-zinc-500 uppercase font-black">Toplam Skor</div>
                <div id="totalPoints" class="text-2xl font-black italic orange-text font-orbitron">0</div>
            </div>
            <div class="card p-4 rounded-xl text-center">
                <div class="text-[9px] text-zinc-500 uppercase font-black">Değer</div>
                <div id="totalValue" class="text-2xl font-black italic font-orbitron">€0M</div>
            </div>
        </div>

        <h2 class="text-xs font-black mb-4 text-zinc-400 uppercase tracking-widest pl-1">Haftanın Yıldızları</h2>
        <div id="mvpContainer" class="space-y-4 mb-10"></div>

        <h2 class="text-xs font-black mb-4 text-zinc-400 uppercase tracking-widest pl-1">Haftanın Raporu</h2>
        <div id="weeklyReport" class="grid grid-cols-2 gap-3 mb-10 text-center"></div>

        <h2 class="text-xs font-black mb-4 text-zinc-400 uppercase tracking-widest pl-1">Tüm Oyuncular</h2>
        <div id="playerContainer" class="space-y-4"></div>

        <div class="flex justify-between items-center mb-4 mt-12">
            <h2 class="text-xs font-black text-zinc-400 uppercase tracking-widest pl-1">Halı Saha Raconu</h2>
            <button onclick="addQuote()" class="admin-only text-[10px] orange-text font-bold border border-orange-900 px-2 py-1 rounded">+ SÖZ EKLE</button>
        </div>
        <div id="quoteContainer" class="space-y-3 mb-20"></div>

        <div class="mt-12 text-center admin-only justify-center">
            <button onclick="resetAllData()" class="text-[10px] text-zinc-700 font-bold hover:text-red-500 transition uppercase tracking-widest">Sezonu Sıfırla (Kaptan)</button>
        </div>
    </div>

    <script>
        const adminPassword = "badboys123";
        const DATA_VERSION = "3.0"; 
        let isAdmin = false;

        function sahayaCik() {
            const audio = document.getElementById('goalCelebration');
            audio.play().catch(e => console.log("Ses oynatma hatası:", e));
            document.getElementById('splash-screen').style.opacity = '0';
            document.getElementById('splash-screen').style.visibility = 'hidden';
            setTimeout(() => { document.getElementById('main-content').classList.add('show-content'); }, 300);
        }

        function checkAdmin() {
            if(prompt("Yönetici şifresi:") === adminPassword) {
                isAdmin = true;
                document.body.classList.add('admin-active');
                render();
            }
        }

        const initialPlayers = [
            { id: 1, name: "HÜSEYİNCAN YÜKSEKDAĞ", role: "KALECİ", goals: 0, assists: 0, value: 5000000, note: "Kalede adeta kocaman bir fil gibi", isCaptain: false, stats: {kondisyon: 90, vefa: 100, sertlik: 85} },
            { id: 2, name: "SÜLEYMAN TUNÇELİK", role: "DEFANS", goals: 0, assists: 0, value: 6500000, note: "Defansın bel kemiği", isCaptain: false, stats: {kondisyon: 90, vefa: 100, sertlik: 75} },
            { id: 3, name: "YAKUP SUNAY", role: "DEFANS", goals: 0, assists: 0, value: 8500000, note: "Her yerde olan koca yürekli kaptan", isCaptain: true, stats: {kondisyon: 90, vefa: 100, sertlik: 75} },
            { id: 4, name: "MEHMET UZUN", role: "DEFANS", goals: 0, assists: 0, value: 6000000, note: "Takımın sert adamı", isCaptain: false, stats: {kondisyon: 90, vefa: 100, sertlik: 80} },
            { id: 5, name: "EROL GÖNÜL", role: "ORTA SAHA", goals: 0, assists: 0, value: 9000000, note: "Her yerden şut atmayı sever", isCaptain: false, stats: {kondisyon: 90, vefa: 100, sertlik: 80} },
            { id: 6, name: "MURAT ÇAYLI", role: "FORVET", goals: 0, assists: 0, value: 11000000, note: "Her alanda çalım deneyebiliyo", isCaptain: false, stats: {kondisyon: 90, vefa: 100, sertlik: 75} },
            { id: 7, name: "EREN YILMAZ", role: "FORVET", goals: 0, assists: 0, value: 12000000, note: "Eşi geldiyse geçmiş olsun diyoruz rakibe", isCaptain: false, stats: {kondisyon: 90, vefa: 100, sertlik: 70} },
            { id: 8, name: "MUSA AKSU", role: "FORVET", goals: 0, assists: 0, value: 10500000, note: "Kıvrak bilekleri ile dosta korku düşmana güven tarzı var", isCaptain: false, stats: {kondisyon: 80, vefa: 100, sertlik: 70} }
        ];

        const initialQuotes = [
            { id: 1, text: "Yakup Sunay abi ayağım kötü...", date: "02.04.2026" },
            { id: 2, text: "Ulan yerden sekti yoksa goldü o pozisyon!", date: "02.04.2026" }
        ];

        let players = JSON.parse(localStorage.getItem('badBoysData')) || initialPlayers;
        let quotes = JSON.parse(localStorage.getItem('badBoysQuotes')) || initialQuotes;

        function updateStat(id, field, amount) {
            const p = players.find(x => x.id === id);
            p[field] = Math.max(0, p[field] + amount);
            p.value += (field === 'goals' ? 500000 : 250000) * amount;
            localStorage.setItem('badBoysData', JSON.stringify(players));
            render();
        }

        function addQuote() {
            const text = prompt("Yeni racon sözünü girin:");
            if(text) {
                const newQuote = { id: Date.now(), text, date: new Date().toLocaleDateString('tr-TR') };
                quotes.unshift(newQuote);
                localStorage.setItem('badBoysQuotes', JSON.stringify(quotes));
                render();
            }
        }

        function resetAllData() {
            if(confirm("Tüm veriler sıfırlanacak! Emin misin kaptan?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function render() {
            const container = document.getElementById('playerContainer');
            const mvpContainer = document.getElementById('mvpContainer');
            const quoteContainer = document.getElementById('quoteContainer');
            const weeklyReport = document.getElementById('weeklyReport');
            
            container.innerHTML = ""; mvpContainer.innerHTML = ""; quoteContainer.innerHTML = "";
            let tScore = 0, tValue = 0;

            const sorted = [...players].sort((a,b) => b.value - a.value);
            
            // Yıldızlar
            sorted.slice(0, 2).forEach(p => {
                mvpContainer.innerHTML += `
                    <div class="mvp-card p-5 rounded-2xl flex justify-between items-center overflow-hidden">
                        <div>
                            <div class="text-[9px] bg-white text-black px-2.5 py-1 rounded-full font-black w-fit mb-2 uppercase tracking-tighter">🔥 Formda</div>
                            <div class="font-black text-2xl italic uppercase font-orbitron">${p.name.split(' ')[0]}</div>
                        </div>
                        <div class="text-right text-lg font-black text-white italic font-orbitron">€${(p.value/1000000).toFixed(1)}M</div>
                    </div>
                `;
            });

            // Haftanın Raporu (Örnek)
            weeklyReport.innerHTML = `
                <div class="card p-3 rounded-xl border-l-4 border-l-green-600">
                    <div class="text-[8px] text-green-500 font-black">MAÇIN ADAMI</div>
                    <div class="text-xs font-bold mt-1 uppercase italic">${players[2].name.split(' ')[0]}</div>
                </div>
                <div class="card p-3 rounded-xl border-l-4 border-l-red-600">
                    <div class="text-[8px] text-red-500 font-black">MAÇIN BİDONU</div>
                    <div class="text-xs font-bold mt-1 uppercase italic text-zinc-500">HÜSEYİN</div>
                </div>
            `;

            // Oyuncu Listesi ve Barlar
            sorted.forEach(p => {
                tScore += (p.goals + p.assists); tValue += p.value;
                container.innerHTML += `
                    <div class="card p-5 rounded-xl">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center gap-2">
                                    <span class="font-bold text-sm italic uppercase">${p.name}</span>
                                    ${p.isCaptain ? '<span class="orange-bg text-black text-[8px] px-1.5 py-0.5 rounded font-black">CPT</span>' : ''}
                                </div>
                                <div class="text-[9px] text-zinc-500 font-bold uppercase mb-1">${p.role}</div>
                                <span class="player-note">"${p.note}"</span>
                                
                                <div class="grid grid-cols-3 gap-3 mt-4 mb-4">
                                    <div>
                                        <div class="text-[7px] opacity-40 font-black uppercase">Kondisyon</div>
                                        <div class="stat-bar"><div class="stat-fill" style="width: ${p.stats.kondisyon}%"></div></div>
                                    </div>
                                    <div>
                                        <div class="text-[7px] opacity-40 font-black uppercase text-orange-400">Vefa</div>
                                        <div class="stat-bar"><div class="stat-fill" style="width: ${p.stats.vefa}%"></div></div>
                                    </div>
                                    <div>
                                        <div class="text-[7px] opacity-40 font-black uppercase">Sertlik</div>
                                        <div class="stat-bar"><div class="stat-fill" style="width: ${p.stats.sertlik}%"></div></div>
                                    </div>
                                </div>

                                <div class="flex gap-4 text-xs font-bold items-center mt-2">
                                    <div class="flex items-center gap-2">
                                        <span class="opacity-70">⚽</span> <span>${p.goals}</span>
                                        <div class="admin-only gap-1">
                                            <button onclick="updateStat(${p.id}, 'goals', -1)" class="w-5 h-5 bg-zinc-900 border border-zinc-800 rounded text-red-500">-</button>
                                            <button onclick="updateStat(${p.id}, 'goals', 1)" class="w-5 h-5 bg-zinc-800 rounded hover:bg-orange-600">+</button>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2 border-l border-zinc-800 pl-4">
                                        <span class="opacity-70">🎯</span> <span>${p.assists}</span>
                                        <div class="admin-only gap-1">
                                            <button onclick="updateStat(${p.id}, 'assists', -1)" class="w-5 h-5 bg-zinc-900 border border-zinc-800 rounded text-red-500">-</button>
                                            <button onclick="updateStat(${p.id}, 'assists', 1)" class="w-5 h-5 bg-zinc-800 rounded hover:bg-orange-600">+</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-base font-black orange-text font-orbitron">€${(p.value/1000000).toFixed(1)}M</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Sözler
            quoteContainer.innerHTML = quotes.map(q => `
                <div class="quote-card p-4 rounded-r-xl">
                    <p class="text-xs italic font-medium">"${q.text}"</p>
                    <span class="text-[8px] text-zinc-600 mt-2 block font-black uppercase italic">${q.date}</span>
                </div>
            `).join('');

            document.getElementById('totalValue').innerText = `€${(tValue/1000000).toFixed(1)}M`;
            document.getElementById('totalPoints').innerText = tScore;
        }
        render();
    </script>
</body>
</html>
