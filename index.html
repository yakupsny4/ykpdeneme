<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD BOYS FC | Takım Portalı</title>
    <style>
        :root {
            --neon-orange: #ff6600;
            --neon-blue: #00d4ff;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Header & Logo --- */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #000 0%, var(--dark-bg) 100%);
        }

        .main-logo {
            width: 250px;
            border-radius: 15px;
            box-shadow: 0 0 20px var(--neon-orange);
            border: 2px solid var(--neon-orange);
        }

        h1 {
            color: var(--neon-orange);
            text-shadow: 0 0 10px var(--neon-orange);
            font-size: 3rem;
            margin-top: 20px;
        }

        /* --- Admin Girişi --- */
        .admin-lock {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            padding: 10px;
            border: 1px solid var(--neon-orange);
            border-radius: 8px;
            z-index: 1000;
        }

        /* --- MVP Alanı --- */
        .mvp-section {
            background: radial-gradient(circle, #331a00 0%, #000 100%);
            padding: 50px 20px;
            text-align: center;
            border-top: 3px solid var(--neon-orange);
            border-bottom: 3px solid var(--neon-orange);
            margin: 40px 0;
        }

        .mvp-card {
            display: inline-block;
            padding: 20px;
            border: 4px solid var(--neon-orange);
            box-shadow: 0 0 30px var(--neon-orange), inset 0 0 15px var(--neon-orange);
            border-radius: 20px;
            transform: scale(1.1);
        }

        /* --- Oyuncu Kartları --- */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .player-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
            position: relative;
        }

        .player-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .player-card h3 { color: var(--neon-orange); margin-bottom: 5px; }
        .player-card p { font-style: italic; font-size: 0.9rem; color: #ccc; }

        .stat-btns {
            margin-top: 15px;
            display: flex;
            gap: 5px;
        }

        .stat-btns button {
            flex: 1;
            padding: 8px 5px;
            background: transparent;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* --- Takım Yoklaması --- */
        .attendance-box {
            max-width: 600px;
            margin: 40px auto;
            background: #111;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--neon-blue);
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }

        .btn-group button {
            background: #222;
            border: none;
            color: #555;
            padding: 8px 12px;
            margin-left: 5px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn-group button.active {
            color: #fff;
            opacity: 1;
            box-shadow: 0 0 10px currentColor;
        }

        .geliyor.active { background: #28a745; color: #fff; }
        .gelmiyor.active { background: #dc3545; color: #fff; }
        .belki.active { background: #ffc107; color: #000; }

        /* --- Taktik Sahası --- */
        .tactics-area {
            text-align: center;
            padding: 50px 20px;
        }

        #pitch {
            width: 340px;
            height: 500px;
            background: #004400;
            margin: 20px auto;
            position: relative;
            border: 5px solid white;
            border-radius: 10px;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, transparent 40px, white 40px, white 42px, transparent 42px);
        }

        .draggable-player {
            width: 45px;
            height: 45px;
            background: var(--neon-orange);
            color: black;
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            cursor: move;
            box-shadow: 0 0 10px #000;
            touch-action: none;
        }

    </style>
</head>
<body>

    <div class="admin-lock">
        <input type="password" id="adminPass" placeholder="Kaptan Şifresi">
        <button onclick="checkAdmin()">Giriş</button>
    </div>

    <header>
        <img src="badboysfc.jpg" alt="BAD BOYS FC" class="main-logo">
        <h1>BAD BOYS FC</h1>
    </header>

    <section class="mvp-section">
        <div class="mvp-card">
            <h2 style="color: gold; text-shadow: 0 0 20px gold;">HAFTANIN MVP'Sİ</h2>
            <h3 id="mvp-name">YAKUP SUNAY</h3>
            <p>Kaptan Gemisini Kurtardı!</p>
        </div>
    </section>

    <div class="player-grid" id="playerGrid">
        <!-- Oyuncular JS ile render edilecek -->
    </div>

    <div class="attendance-box">
        <h2 style="color: var(--neon-blue);">TAKIM YOKLAMASI</h2>
        <div id="attendanceList"></div>
    </div>

    <div class="tactics-area">
        <h2 style="color: var(--neon-orange);">TAKTİK TAHTASI (Taşı-Bırak)</h2>
        <div id="pitch">
            <!-- Oyuncu pulları buraya gelecek -->
        </div>
    </div>

    <script>
        const players = [
            { name: "Hüseyin Yüksekdağ", pos: "Kaleci", desc: "Kalede o varsa sırtımız sağlam" },
            { name: "Süleyman Tunçelik", pos: "Defans", desc: "Defansın her alanına sorgusuzca geçer" },
            { name: "Mehmet Uzun", pos: "Defans", desc: "Takımın sert adamı" },
            { name: "Yakup Sunay", pos: "Kaptan/Defans", desc: "Her bölgeye yetişen koca bir kaptan" },
            { name: "Murat Çaylı", pos: "Forvet", desc: "Akrobatik hareketler ve çalım aşığı" },
            { name: "Erol Gönül", pos: "Orta Saha", desc: "Her yerden şut çeker!" },
            { name: "Eren Yılmaz", pos: "Forvet", desc: "Yengemiz izliyorsa rakip yandı" },
            { name: "Musa Aksu", pos: "Forvet", desc: "Dosta korku, rakibe güven... pardon tersi!" }
        ];

        let isAdmin = false;

        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "badboysfc1907") {
                isAdmin = true;
                alert("Kaptan girişi başarılı! Veri girebilirsiniz.");
            } else {
                alert("Hatalı şifre!");
            }
        }

        // Oyuncu Kartlarını Oluştur
        const grid = document.getElementById('playerGrid');
        players.forEach(p => {
            grid.innerHTML += `
                <div class="player-card">
                    <h3>${p.name}</h3>
                    <small>${p.pos}</small>
                    <p>"${p.desc}"</p>
                    <div class="stat-btns">
                        <button onclick="updateStat()">GOL EKLE</button>
                        <button onclick="updateStat()">ASİST EKLE</button>
                        ${p.pos === 'Kaleci' ? '<button onclick="updateStat()">YEDİĞİ GOL</button>' : ''}
                    </div>
                </div>
            `;
        });

        function updateStat() {
            if(!isAdmin) return alert("Bu işlem için Kaptan girişi yapmalısın!");
            alert("İstatistik güncellendi!");
        }

        // Yoklama Listesi
        const attList = document.getElementById('attendanceList');
        players.forEach(p => {
            attList.innerHTML += `
                <div class="player-row">
                    <span>${p.name}</span>
                    <div class="btn-group">
                        <button class="geliyor" onclick="toggleAtt(this)">Geliyor</button>
                        <button class="gelmiyor" onclick="toggleAtt(this)">Yok</button>
                        <button class="belki" onclick="toggleAtt(this)">Belki</button>
                    </div>
                </div>
            `;
        });

        function toggleAtt(btn) {
            const parent = btn.parentElement;
            Array.from(parent.children).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Taktik Sahası Drag & Drop (Basit Versiyon)
        const pitch = document.getElementById('pitch');
        players.forEach((p, index) => {
            const el = document.createElement('div');
            el.className = 'draggable-player';
            el.innerText = p.name.split(' ')[0];
            el.style.left = '10px';
            el.style.top = (index * 50 + 10) + 'px';
            
            // Mouse & Touch Sürükleme Mantığı
            let isDragging = false;
            el.onmousedown = (e) => { isDragging = true; };
            document.onmousemove = (e) => {
                if (!isDragging) return;
                let rect = pitch.getBoundingClientRect();
                let x = e.clientX - rect.left - 22;
                let y = e.clientY - rect.top - 22;
                if(x > 0 && x < 300) el.style.left = x + 'px';
                if(y > 0 && y < 460) el.style.top = y + 'px';
            };
            document.onmouseup = () => { isDragging = false; };
            
            pitch.appendChild(el);
        });
    </script>
</body>
</html>
