<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD BOYS FC | PRO KADRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .orange-text { color: #ff4500; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.3s; }
        .admin-only { display: none; }
        .admin-active .admin-only { display: flex; }

        /* TURUNCU KİLİT LOGOSU */
        .admin-lock-btn {
            position: fixed; right: 20px; top: 80px;
            border: 4px solid #ff4500; background: #000;
            padding: 12px; border-radius: 15px; color: #ff4500;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.4);
            z-index: 1000; cursor: pointer;
        }
        .admin-active .admin-lock-btn { background: #ff4500; color: #000; }

        .marquee-container { background: #ff4500; color: black; padding: 6px 0; font-weight: 900; font-size: 11px; text-transform: uppercase; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .pitch {
            background: #061806; border: 2px solid #1a4a1a; position: relative;
            height: 400px; border-radius: 10px; margin: 20px 0; overflow: hidden;
            background-image: linear-gradient(#1a4a1a 1px, transparent 1px), linear-gradient(90deg, #1a4a1a 1px, transparent 1px);
            background-size: 50% 100%; background-position: center;
        }
        .player-dot {
            position: absolute; min-width: 90px; padding: 4px; background: #ff4500;
            color: black; font-size: 7px; font-weight: 900; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; text-align: center;
            border: 2px solid white; transform: translateX(-50%); z-index: 10;
        }
        .stat-badge { font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; background: #1a1a1a; }
        .stat-btn { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 900; margin-left: 4px; }
    </style>
</head>
<body>

    <div class="marquee-container sticky top-0 z-50">
        <div class="marquee-text italic">BAD BOYS FC • KAPTAN YAKUP SUNAY • LİGİN EN SERT TAKIMI • BAD BOYS FC •</div>
    </div>

    <button onclick="checkAdmin()" class="admin-lock-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </button>

    <div class="container mx-auto max-w-md p-4 pb-24">
        <header class="mb-8 mt-4 text-center">
            <h1 class="text-4xl font-black italic orange-text font-orbitron uppercase">BAD BOYS FC</h1>
            <p class="text-zinc-500 text-[10px] font-bold tracking-[0.3em]">RESMİ OYUNCU PANELİ</p>
        </header>

        <div class="pitch" id="tacticalPitch"></div>

        <h2 class="text-xs font-black mb-4 text-zinc-400 uppercase tracking-widest">👥 OYUNCU İSTATİSTİKLERİ</h2>
        <div id="playerList" class="space-y-4"></div>

        <!-- SIFIRLAMA BUTONU -->
        <button onclick="resetData()" class="admin-only w-full mt-10 p-4 border-2 border-red-600 text-red-600 font-black rounded-xl bg-red-900/10">
            ⚠️ TÜM VERİLERİ VE HATALARI SIFIRLA
        </button>
    </div>

    <script>
        const adminPassword = "badboys123";
        let isAdmin = false;

        const initialPlayers = [
            { id: 1, name: "HÜSEYİNCAN YÜKSEKDAĞ", value: "10.0M €", quote: "Kalede adeta kocaman bir fil gibi.", goals: 0, assists: 0, conceded: 0, pos: { x: 50, y: 90 } },
            { id: 2, name: "SÜLEYMAN TUNÇELİK", value: "10.0M €", quote: "Defansın bel kemiği.", goals: 0, assists: 0, conceded: 0, pos: { x: 25, y: 70 } },
            { id: 3, name: "YAKUP SUNAY", value: "10.0M €", quote: "Her yerde olan koca yürekli kaptan.", goals: 0, assists: 0, conceded: 0, pos: { x: 75, y: 70 } },
            { id: 4, name: "MEHMET UZUN", value: "10.0M €", quote: "Takımın sert adamı.", goals: 0, assists: 0, conceded: 0, pos: { x: 50, y: 55 } },
            { id: 5, name: "EROL GÖNÜL", value: "10.0M €", quote: "Her yerden şut atmayı sever.", goals: 0, assists: 0, conceded: 0, pos: { x: 25, y: 35 } },
            { id: 6, name: "MURAT ÇAYLI", value: "10.0M €", quote: "Her alanda çalım deneyebiliyor.", goals: 0, assists: 0, conceded: 0, pos: { x: 75, y: 35 } },
            { id: 7, name: "EREN YILMAZ", value: "10.0M €", quote: "Maçı izlemeye eşi geldiyse geçmiş olsun diyoruz rakibe.", goals: 0, assists: 0, conceded: 0, pos: { x: 50, y: 20 } },
            { id: 8, name: "MUSA AKSU", value: "10.0M €", quote: "Kıvrak bilekleri ile dosta korku düşmana güven tarzı var.", goals: 0, assists: 0, conceded: 0, pos: { x: 50, y: 5 } }
        ];

        let players = JSON.parse(localStorage.getItem('bb_data_v4')) || initialPlayers;

        function checkAdmin() {
            if(prompt("Şifre:") === adminPassword) {
                isAdmin = true;
                document.body.classList.add('admin-active');
                render();
            }
        }

        function resetData() {
            if(confirm("Tüm istatistikler ve isimler fabrika ayarlarına dönecek. Onay?")) {
                localStorage.removeItem('bb_data_v4');
                players = JSON.parse(JSON.stringify(initialPlayers));
                location.reload();
            }
        }

        function updateStat(id, field, value) {
            const player = players.find(p => p.id === id);
            player[field] = Math.max(0, player[field] + value);
            localStorage.setItem('bb_data_v4', JSON.stringify(players));
            render();
        }

        function render() {
            // Saha Çizimi
            const pitch = document.getElementById('tacticalPitch');
            pitch.innerHTML = '';
            players.forEach(p => {
                pitch.innerHTML += `<div class="player-dot" style="left:${p.pos.x}%; top:${p.pos.y}%">${p.name}</div>`;
            });

            // Oyuncu Kartları ve Butonlar
            const list = document.getElementById('playerList');
            list.innerHTML = players.map(p => `
                <div class="card p-4 rounded-2xl border-zinc-800">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="font-black text-xs uppercase text-white">${p.name}</h3>
                            <p class="text-[10px] text-green-500 font-black font-orbitron">${p.value}</p>
                        </div>
                        <div class="flex flex-col gap-1 text-right">
                            <span class="stat-badge text-red-500">🧤 YEDİĞİ: ${p.conceded}</span>
                            <span class="stat-badge text-white">⚽ GOL: ${p.goals}</span>
                            <span class="stat-badge text-blue-400">🎯 ASİST: ${p.assists}</span>
                        </div>
                    </div>
                    
                    <p class="text-[9px] text-zinc-500 italic mb-4">"${p.quote}"</p>

                    <div class="admin-only grid grid-cols-3 gap-2 border-t border-zinc-900 pt-3">
                        <button onclick="updateStat(${p.id}, 'conceded', 1)" class="stat-btn bg-red-900 text-white">YEDİ +1</button>
                        <button onclick="updateStat(${p.id}, 'goals', 1)" class="stat-btn bg-zinc-800 text-white">GOL +1</button>
                        <button onclick="updateStat(${p.id}, 'assists', 1)" class="stat-btn bg-zinc-800 text-blue-400">ASİST +1</button>
                        
                        <button onclick="updateStat(${p.id}, 'conceded', -1)" class="stat-btn bg-zinc-900 text-zinc-600">SİL -1</button>
                        <button onclick="updateStat(${p.id}, 'goals', -1)" class="stat-btn bg-zinc-900 text-zinc-600">SİL -1</button>
                        <button onclick="updateStat(${p.id}, 'assists', -1)" class="stat-btn bg-zinc-900 text-zinc-600">SİL -1</button>
                    </div>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
