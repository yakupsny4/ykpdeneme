<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAD BOYS FC PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#080808;
color:white;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

/* duman efekti */
.glow{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle, rgba(255,100,0,0.6), transparent);
filter:blur(40px);
animation:pulse 3s infinite;
}
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

#intro img{
width:180px;
z-index:2;
}

#startBtn{
margin-top:20px;
padding:10px 20px;
background:#ff6a00;
border:none;
border-radius:8px;
font-size:16px;
color:white;
box-shadow:0 0 15px #ff6a00;
}

/* HEADER */
header{
text-align:center;
padding:15px;
background:linear-gradient(90deg,#ff6a00,#000);
font-size:24px;
box-shadow:0 0 15px #ff6a00;
}

/* NAV */
nav{
display:flex;
background:#111;
}
nav button{
flex:1;
background:none;
border:none;
color:#ff6a00;
padding:10px;
font-size:15px;
}

/* PAGE */
.page{display:none;padding:10px;}
.active{display:block;}

/* CARD */
.card{
background:linear-gradient(145deg,#141414,#1f1f1f);
border:1px solid #ff6a00;
border-radius:14px;
padding:12px;
margin:10px;
box-shadow:0 0 12px rgba(255,106,0,0.4);
transition:0.3s;
}
.card:hover{
transform:scale(1.03);
box-shadow:0 0 25px #ff6a00;
}

.card h3{
color:#ff6a00;
margin:0;
}

.desc{
font-size:13px;
opacity:0.8;
margin:5px 0;
}

/* FIELD */
.field{
width:100%;
height:420px;
background:#0f0f0f;
border:2px solid #ff6a00;
position:relative;
}

/* saha detay */
.center-line{
position:absolute;
width:100%;
height:2px;
background:white;
top:50%;
}
.circle{
position:absolute;
width:120px;
height:120px;
border:2px solid white;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}
.goal{
position:absolute;
width:60px;
height:120px;
border:2px solid white;
top:50%;
transform:translateY(-50%);
}
.goal.left{left:0;}
.goal.right{right:0;}

/* PLAYER */
.player{
position:absolute;
background:#ff6a00;
color:black;
padding:6px;
border-radius:8px;
font-size:12px;
touch-action:none;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}
.modal-content{
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #ff6a00;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<div class="glow"></div>
<img src="badboysfc.jpg">
<button id="startBtn" onclick="startSite()">Kadronu Gör</button>
</div>

<header>🔥 BAD BOYS FC 🔥</header>

<nav>
<button onclick="showPage('home')">Ana Sayfa</button>
<button onclick="showPage('tactic')">Taktik</button>
<button onclick="showPage('matches')">Maçlar</button>
</nav>

<div id="home" class="page active"></div>

<div id="tactic" class="page">
<div class="field" id="field">
<div class="center-line"></div>
<div class="circle"></div>
<div class="goal left"></div>
<div class="goal right"></div>
</div>
</div>

<div id="matches" class="page"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>
function startSite(){
document.getElementById("intro").style.display="none";
}

let data=JSON.parse(localStorage.getItem("teamData"))||{
players:[
{name:"Hüseyincan",desc:"Kalesinde güven veren bir panter",gol:0,asist:0,no:1},
{name:"Süleyman",desc:"Stoperin vazgeçilmez adamı",gol:0,asist:0,no:2},
{name:"Mehmet",desc:"Takımın sert adamı",gol:0,asist:0,no:3},
{name:"Yakup",desc:"Her bölgeye yetişen koca yürekli kaptan",gol:0,asist:0,no:4},
{name:"Erol",desc:"Her bölgeden şut atabilir ansızın",gol:0,asist:0,no:5},
{name:"Murat",desc:"Çalım ve akrobatik hareketleri sever",gol:0,asist:0,no:6},
{name:"Eren",desc:"Eşi maçı izlemeye geldiyse o maç bitmiştir",gol:0,asist:0,no:7},
{name:"Musa",desc:"Kıvrak bilekleri ile dosta korku düşmana güven verir",gol:0,asist:0,no:8}
]
};

function showPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

function renderHome(){
let html="";
data.players.forEach((p,i)=>{
let rating=p.gol*2+p.asist;

html+=`
<div class="card" onclick="openPlayer(${i})">
<h3>${p.name}</h3>
<p class="desc">${p.desc}</p>
<p>⭐ Reyting: ${rating}</p>
</div>
`;
});
document.getElementById("home").innerHTML=html;
}

function openPlayer(i){
let p=data.players[i];

document.getElementById("modalContent").innerHTML=`
<h2>${p.name}</h2>
<p>${p.desc}</p>
<p>⚽ ${p.gol}</p>
<p>🎯 ${p.asist}</p>
<button onclick="update(${i},'gol',1)">Gol +</button>
<button onclick="update(${i},'asist',1)">Asist +</button>
`;

document.getElementById("modal").style.display="flex";
}

document.getElementById("modal").onclick=()=>modal.style.display="none";

function update(i,t,v){
data.players[i][t]+=v;
localStorage.setItem("teamData",JSON.stringify(data));
renderHome();
}

renderHome();
</script>

</body>
</html>
