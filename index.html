<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAD BOYS FC</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#000; color:white; font-family:Arial; }
.orange { color:#ff4500; }
.card { background:#0a0a0a; border:1px solid #222; border-radius:15px; padding:15px; }
.stat-bar { height:4px; background:#222; border-radius:3px; }
.stat-fill { height:100%; background:#ff4500; }

.admin-only { display:none; }
.admin-active .admin-only { display:flex; }

/* 🔥 INTRO */
#logoIntro {
 position: fixed;
 width:100%;
 height:100%;
 top:0;
 left:0;
 z-index:9999;
 background: radial-gradient(circle at center, #1a0a00, #000);
 display:flex;
 justify-content:center;
 align-items:center;
 overflow:hidden;
 transition:1s;
}

.intro-bg {
 position:absolute;
 width:200%;
 height:200%;
 background: radial-gradient(circle, rgba(255,69,0,0.2), transparent);
 animation: moveBg 6s infinite linear;
}

@keyframes moveBg {
 0% { transform: rotate(0deg); }
 100% { transform: rotate(360deg); }
}

.logo-box {
 position:relative;
 z-index:2;
 text-align:center;
 animation: fadeIn 1.5s ease;
}

.logo-img {
 width:150px;
 margin-bottom:20px;
 filter: drop-shadow(0 0 20px rgba(255,69,0,0.8));
 animation: logoPulse 2s infinite;
}

@keyframes logoPulse {
 0% { transform: scale(1); }
 50% { transform: scale(1.08); }
 100% { transform: scale(1); }
}

.logo-text {
 font-size:36px;
 color:#ff4500;
 font-weight:900;
}

.logo-sub {
 font-size:11px;
 letter-spacing:3px;
 margin:10px 0 20px;
}

.enter-btn {
 padding:12px 35px;
 background:#ff4500;
 color:black;
 border:none;
 border-radius:30px;
 font-weight:bold;
 cursor:pointer;
 box-shadow:0 0 15px rgba(255,69,0,0.7);
}

@keyframes fadeIn {
 from { opacity:0; transform: translateY(20px); }
 to { opacity:1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- 🔥 LOGO INTRO -->
<div id="logoIntro">
  <div class="intro-bg"></div>

  <div class="logo-box">
    <img src="badboysfc.jpg" class="logo-img">
    <h1 class="logo-text">BAD BOYS FC</h1>
    <p class="logo-sub">SAHADA TER • SİTEDE GURUR</p>

    <button onclick="enterSite()" class="enter-btn">
      SAHAYA GİR
    </button>
  </div>
</div>

<h1 class="text-center text-3xl orange mt-4">BAD BOYS FC 🔥</h1>

<button onclick="checkAdmin()" class="block mx-auto mt-2 text-sm">Admin</button>

<div id="players" class="p-4 space-y-4"></div>

<script>

const adminPassword = "badboys123";
let isAdmin = false;

function checkAdmin(){
 if(prompt("Şifre:") === adminPassword){
   document.body.classList.add("admin-active");
   isAdmin = true;
   render();
 }
}

/* 🔥 INTRO JS */
function enterSite(){
 let intro = document.getElementById("logoIntro");
 intro.style.opacity = "0";
 intro.style.transform = "scale(1.2)";
 setTimeout(()=>{
   intro.style.display = "none";
 },800);
}

const initialPlayers = [
{ id:1,name:"HÜSEYİN",role:"KALECİ",goals:0,assists:0,matches:0,mvp:0,photo:"https://via.placeholder.com/150",stats:{kondisyon:90,vefa:100,sertlik:80}},
{ id:2,name:"SÜLEYMAN",role:"DEFANS",goals:0,assists:0,matches:0,mvp:0,photo:"https://via.placeholder.com/150",stats:{kondisyon:85,vefa:90,sertlik:75}},
{ id:3,name:"YAKUP",role:"DEFANS",goals:0,assists:0,matches:0,mvp:0,photo:"https://via.placeholder.com/150",isCaptain:true,stats:{kondisyon:90,vefa:100,sertlik:80}},
{ id:4,name:"MEHMET",role:"DEFANS",goals:0,assists:0,matches:0,mvp:0,photo:"https://via.placeholder.com/150",stats:{kondisyon:80,vefa:85,sertlik:85}},
{ id:5,name:"EROL",role:"ORTA SAHA",goals:0,assists:0,matches:0,mvp:0,photo:"https://via.placeholder.com/150",stats:{kondisyon:85,vefa:90,sertlik:70}},
{ id:6,name:"MURAT",role:"FORVET",goals:0,assists:0,matches:0,mvp:0,photo:"https://via.placeholder.com/150",stats:{kondisyon:85,vefa:80,sertlik:70}},
{ id:7,name:"EREN",role:"FORVET",goals:0,assists:0,matches:0,mvp:0,photo:"https://via.placeholder.com/150",stats:{kondisyon:80,vefa:85,sertlik:65}},
{ id:8,name:"MUSA",role:"FORVET",goals:0,assists:0,matches:0,mvp:0,photo:"https://via.placeholder.com/150",stats:{kondisyon:75,vefa:80,sertlik:65}}
];

let players = JSON.parse(localStorage.getItem("data")) || initialPlayers;

function save(){
 localStorage.setItem("data",JSON.stringify(players));
}

function updateStat(id,field,val){
 let p = players.find(x=>x.id===id);
 p[field]+=val;
 if(p[field]<0)p[field]=0;
 save();
 render();
}

function changePhoto(id){
 let url = prompt("Foto link:");
 if(url){
  let p = players.find(x=>x.id===id);
  p.photo=url;
  save();
  render();
 }
}

function render(){

 let best = [...players].sort((a,b)=>(b.goals+b.assists)-(a.goals+a.assists))[0];

 let area=document.getElementById("players");
 area.innerHTML="";

 players.forEach(p=>{

 area.innerHTML+=`
 <div class="card">

   <div class="flex gap-3 items-center mb-3">
     <img src="${p.photo}" class="w-16 h-16 rounded-xl object-cover">
     
     <div>
       <div class="font-bold">${p.name} ${p.isCaptain?"(C)":""}</div>
       <div class="text-xs text-gray-400">${p.role}</div>
     </div>

     <button onclick="changePhoto(${p.id})" class="admin-only ml-auto">📸</button>
   </div>

   <div class="grid grid-cols-3 gap-2 mb-3">
     <div><div class="text-xs">KND</div><div class="stat-bar"><div class="stat-fill" style="width:${p.stats.kondisyon}%"></div></div></div>
     <div><div class="text-xs">VEFA</div><div class="stat-bar"><div class="stat-fill" style="width:${p.stats.vefa}%"></div></div></div>
     <div><div class="text-xs">SRT</div><div class="stat-bar"><div class="stat-fill" style="width:${p.stats.sertlik}%"></div></div></div>
   </div>

   <div class="flex gap-4 text-sm">
     ⚽ ${p.goals}
     🎯 ${p.assists}
     🏟️ ${p.matches}
     ⭐ ${p.mvp}
   </div>

   <div class="admin-only gap-2 mt-2">
     <button onclick="updateStat(${p.id},'goals',1)">+G</button>
     <button onclick="updateStat(${p.id},'assists',1)">+A</button>
     <button onclick="updateStat(${p.id},'matches',1)">+M</button>
     <button onclick="updateStat(${p.id},'mvp',1)">+⭐</button>
   </div>

 </div>
 `;
 });

 area.innerHTML = `<div class="text-center mb-4 text-orange-500 font-bold">🔥 Haftanın En İyisi: ${best.name}</div>` + area.innerHTML;
}

render();

</script>

</body>
</html>
