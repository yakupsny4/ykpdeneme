<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAD BOYS FC</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#000; color:white; font-family:Arial; }

/* INTRO */
#intro{
 position:fixed;
 width:100%;
 height:100%;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:9999;
}

.intro-logo{
 width:120px;
 animation:pulse 2s infinite;
}

@keyframes pulse{
 0%{transform:scale(1)}
 50%{transform:scale(1.1)}
 100%{transform:scale(1)}
}

/* KİLİT */
.lock{
 position:fixed;
 top:15px;
 right:15px;
 font-size:26px;
 background:#111;
 padding:12px;
 border-radius:50%;
 cursor:pointer;
}

/* KART */
.card{
 background:#0a0a0a;
 border-radius:15px;
 padding:15px;
 transition:.3s;
 position:relative;
 overflow:hidden;
}

.card:hover{
 transform:scale(1.03);
 box-shadow:0 0 20px #ff4500;
}

/* FOTO */
.player-img{
 width:60px;
 height:60px;
 border-radius:10px;
 object-fit:cover;
}

/* MVP */
.mvp{
 border:2px solid gold;
 box-shadow:0 0 20px gold;
}

/* SAHA */
.field{
 background:#0f3d0f;
 height:300px;
 margin:20px;
 border-radius:15px;
 position:relative;
}

.dot{
 position:absolute;
 background:#ff4500;
 padding:4px 8px;
 border-radius:8px;
 font-size:10px;
 cursor:pointer;
}

/* GOL EFEKT */
.goal{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:50px;
 color:#ff4500;
 animation:boom 1s ease;
}

@keyframes boom{
 0%{opacity:0;transform:scale(0)}
 50%{opacity:1;transform:scale(1.5)}
 100%{opacity:0}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<img src="badboysfc.jpg" class="intro-logo">
<h1 class="text-2xl mt-3">BAD BOYS FC</h1>
<button onclick="start()" class="mt-4 bg-orange-500 px-6 py-2 rounded">GİR</button>
</div>

<!-- KİLİT -->
<div onclick="adminLogin()" class="lock">🔒</div>

<h1 class="text-center text-3xl mt-4 text-orange-500">BAD BOYS FC 🔥</h1>

<div id="field" class="field admin-only"></div>
<div id="players" class="p-4 space-y-4"></div>

<script>

let admin=false;
const pass="badboys123";

function start(){
 document.getElementById("intro").style.display="none";
}

function adminLogin(){
 if(prompt("Şifre:")==pass){
   admin=true;
   document.body.classList.add("admin-active");
   render();
 }
}

const players=[
{id:1,name:"HÜSEYİNCAN YÜKSEKDAĞ",role:"KALECİ",quote:"Kalede adeta fil gibi",photo:"https://via.placeholder.com/150",x:45,y:80,g:0},
{id:2,name:"SÜLEYMAN TUNÇELİK",role:"DEFANS",quote:"Bel kemiği",photo:"https://via.placeholder.com/150",x:20,y:60,g:0},
{id:3,name:"YAKUP SUNAY",role:"DEFANS",quote:"Koca yürekli kaptan",photo:"https://via.placeholder.com/150",x:50,y:60,g:0},
{id:4,name:"MEHMET UZUN",role:"DEFANS",quote:"Sert adam",photo:"https://via.placeholder.com/150",x:80,y:60,g:0},
{id:5,name:"EROL GÖNÜL",role:"ORTA SAHA",quote:"Şut ustası",photo:"https://via.placeholder.com/150",x:30,y:40,g:0},
{id:6,name:"MURAT ÇAYLI",role:"FORVET",quote:"Çalımcı",photo:"https://via.placeholder.com/150",x:70,y:40,g:0},
{id:7,name:"EREN",role:"FORVET",quote:"Eşi geldiyse geçmiş olsun",photo:"https://via.placeholder.com/150",x:30,y:20,g:0},
{id:8,name:"MUSA AKSU",role:"FORVET",quote:"Kıvrak bilek",photo:"https://via.placeholder.com/150",x:70,y:20,g:0}
];

function goalEffect(){
 let g=document.createElement("div");
 g.className="goal";
 g.innerText="GOAL!";
 document.body.appendChild(g);
 setTimeout(()=>g.remove(),1000);
}

function render(){

 let best=[...players].sort((a,b)=>b.g-a.g)[0];

 let area=document.getElementById("players");
 area.innerHTML="";

 players.forEach(p=>{

 area.innerHTML+=`
 <div class="card ${p.id==best.id?"mvp":""}">
   <div class="flex gap-3">
     <img src="${p.photo}" class="player-img">
     <div>
       <div class="font-bold">${p.name}</div>
       <div class="text-xs text-gray-400">${p.role}</div>
       <div class="text-xs mt-1 italic">${p.quote}</div>
     </div>
   </div>

   ${admin?`<button onclick="score(${p.id})" class="mt-2 bg-orange-500 px-3 py-1 rounded">⚽ Gol</button>`:""}
 </div>
 `;
 });

 renderField();
}

function score(id){
 let p=players.find(x=>x.id==id);
 p.g++;
 goalEffect();
 render();
}

/* SAHA */
function renderField(){
 let f=document.getElementById("field");
 if(!admin){ f.innerHTML=""; return;}

 f.innerHTML="";
 players.forEach(p=>{
  f.innerHTML+=`
  <div class="dot" draggable="true"
   ondragend="move(event,${p.id})"
   style="left:${p.x}%; top:${p.y}%">
   ${p.name.split(" ")[0]}
  </div>`;
 });
}

function move(e,id){
 let rect=e.target.parentElement.getBoundingClientRect();
 let x=(e.clientX-rect.left)/rect.width*100;
 let y=(e.clientY-rect.top)/rect.height*100;

 let p=players.find(x=>x.id==id);
 p.x=x; p.y=y;

 renderField();
}

render();

</script>

</body>
</html>
