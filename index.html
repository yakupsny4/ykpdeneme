<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Halısaha Ligi</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Kart ve efektler */
.glass{
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
}
.card-glow{
    transition: all .35s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}
.card-glow:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 25px 60px rgba(57,255,20,.25);
}
.stat-bar{
    width:100%;
    height:6px;
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
}
.stat-fill{
    height:100%;
    background:linear-gradient(90deg,#39ff14,#00ffa6);
    border-radius:10px;
    transition:width 1s ease;
}
.player-avatar{
    transition:transform .4s ease;
}
.group:hover .player-avatar{
    transform:scale(1.1) rotate(2deg);
}
</style>
</head>
<body class="bg-gray-900 text-white font-sans">

<main class="max-w-7xl mx-auto px-4 mt-12 grid grid-cols-1 lg:grid-cols-12 gap-8">

    <!-- SOL: KADRO ANALİZİ -->
    <div class="lg:col-span-8 space-y-8">
        <h2 class="text-2xl border-l-8 border-green-500 pl-4 font-bold mb-4">KADRO ANALİZİ</h2>
        
        <!-- Oyuncu kartlarının gridi -->
        <div id="playerGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Başlangıç oyuncuları burada olacak, JS ile eklenebilir -->
        </div>

        <!-- Oyuncu ekleme formu -->
        <div class="glass p-6 rounded-3xl mt-8">
            <h3 class="text-green-500 font-bold mb-4">Oyuncu Ekle</h3>
            <form id="addPlayerForm" class="space-y-3">
                <div class="flex gap-2">
                    <input type="text" id="playerName" placeholder="İsim" class="flex-1 p-2 rounded bg-gray-800">
                    <input type="text" id="playerNick" placeholder="Lakab" class="flex-1 p-2 rounded bg-gray-800">
                    <input type="number" id="playerNumber" placeholder="Numara" class="w-20 p-2 rounded bg-gray-800">
                </div>
                <div class="flex gap-2">
                    <input type="number" id="playerShot" placeholder="Şut (%)" class="flex-1 p-2 rounded bg-gray-800" min="0" max="100">
                    <input type="number" id="playerDribble" placeholder="Dribling (%)" class="flex-1 p-2 rounded bg-gray-800" min="0" max="100">
                    <input type="number" id="playerReflex" placeholder="Refleks (%)" class="flex-1 p-2 rounded bg-gray-800" min="0" max="100">
                </div>
                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-2 rounded">
                    Oyuncu Ekle
                </button>
            </form>
        </div>

    </div>

    <!-- SAĞ PANEL: Haftanın Enleri -->
    <div class="lg:col-span-4 space-y-6">
        <div class="glass border-green-500/30 p-6 rounded-3xl">
            <h3 class="text-green-500 font-bold mb-4">🏆 HAFTANIN ENLERİ</h3>
            <div id="topPlayers" class="space-y-4">
                <!-- JS ile güncellenecek -->
            </div>
        </div>
    </div>
</main>

<footer class="fixed bottom-0 w-full glass py-4 text-center text-[10px] uppercase tracking-[0.3em] text-gray-500">
    Bu site sadece gerçek yetenekler içindir. (Ciddiye almayın)
</footer>

<script>
// Başlangıç oyuncuları
let players = [
    {name:"Caner", nick:"Tank", number:99, shot:99, dribble:80, reflex:50, goals:3, assists:2},
    {name:"Kerem", nick:"Pas-Yok", number:10, shot:70, dribble:85, reflex:60, goals:1, assists:0},
    {name:"Volkan", nick:"Panter", number:1, shot:10, dribble:20, reflex:92, goals:0, assists:0},
];

// Oyuncuları grid’e ekleme fonksiyonu
function renderPlayers(){
    const grid = document.getElementById("playerGrid");
    grid.innerHTML = "";
    players.forEach(player=>{
        const div = document.createElement("div");
        div.className = "glass card-glow p-6 rounded-3xl relative overflow-hidden group";
        div.innerHTML = `
            <div class="flex gap-4 items-start">
                <div class="w-24 h-24 bg-gray-700 rounded-2xl overflow-hidden border-2 border-green-500/30">
                    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${player.name}" class="w-full h-full object-cover player-avatar">
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-black italic">${player.name} "${player.nick}"</h3>
                        <span class="text-green-500 font-bold">#${player.number}</span>
                    </div>
                    <div class="space-y-2 mt-2">
                        <div class="text-[10px] uppercase flex justify-between"><span>Şut</span> <span>${player.shot}%</span></div>
                        <div class="stat-bar"><div class="stat-fill" style="width:${player.shot}%"></div></div>
                        <div class="text-[10px] uppercase flex justify-between"><span>Dribling</span> <span>${player.dribble}%</span></div>
                        <div class="stat-bar"><div class="stat-fill" style="width:${player.dribble}%"></div></div>
                        <div class="text-[10px] uppercase flex justify-between"><span>Refleks</span> <span>${player.reflex}%</span></div>
                        <div class="stat-bar"><div class="stat-fill" style="width:${player.reflex}%"></div></div>
                    </div>
                </div>
            </div>
        `;
        grid.appendChild(div);
    });
    renderTopPlayers();
}

// Haftanın Enlerini gösterme
function renderTopPlayers(){
    const container = document.getElementById("topPlayers");
    container.innerHTML = "";

    // MVP = en çok gol atan
    const mvp = players.reduce((a,b)=>a.goals>=b.goals?a:b);
    const mvpDiv = document.createElement("div");
    mvpDiv.innerHTML = `<p class="text-[10px] uppercase text-gray-500 font-bold">MVP</p><p class="font-bold">${mvp.name} "${mvp.nick}" - ${mvp.goals} gol</p>`;
    container.appendChild(mvpDiv);

    // Asist kralı
    const assistKing = players.reduce((a,b)=>a.assists>=b.assists?a:b);
    const assistDiv = document.createElement("div");
    assistDiv.innerHTML = `<p class="text-[10px] uppercase text-gray-500 font-bold">Asist Kralı</p><p class="font-bold">${assistKing.name} "${assistKing.nick}" - ${assistKing.assists} asist</p>`;
    container.appendChild(assistDiv);
}

// Form ile oyuncu ekleme
document.getElementById("addPlayerForm").addEventListener("submit", e=>{
    e.preventDefault();
    const name = document.getElementById("playerName").value;
    const nick = document.getElementById("playerNick").value;
    const number = document.getElementById("playerNumber").value;
    const shot = document.getElementById("playerShot").value;
    const dribble = document.getElementById("playerDribble").value;
    const reflex = document.getElementById("playerReflex").value;

    players.push({name,nick,number,shot,dribble,reflex,goals:0,assists:0});
    renderPlayers();

    // formu temizle
    e.target.reset();
});

// İlk render
renderPlayers();
</script>

</body>
</html>
