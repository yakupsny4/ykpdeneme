<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAD BOYS FC</title>

<style>
body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

/* GİRİŞ */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
animation:fadeOut 3s forwards;
animation-delay:2s;
}
#intro img{
width:200px;
animation:zoom 2s;
}

@keyframes zoom{
0%{transform:scale(0)}
100%{transform:scale(1)}
}
@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* HEADER */
header{
text-align:center;
padding:20px;
font-size:28px;
background:linear-gradient(90deg,#ff6a00,#000);
}

/* CARD */
.card{
background:#111;
border:2px solid #ff6a00;
border-radius:12px;
padding:12px;
margin:10px;
width:260px;
display:inline-block;
transition:0.3s;
}
.card:hover{
box-shadow:0 0 15px #ff6a00;
}

button{
background:#ff6a00;
border:none;
padding:5px 10px;
margin:2px;
border-radius:5px;
cursor:pointer;
color:white;
}

input{
width:40px;
}

/* FIELD */
.field{
width:100%;
height:420px;
background:#111;
border:3px solid #ff6a00;
position:relative;
margin-top:20px;
}

/* saha çizgileri */
.line{
position:absolute;
background:white;
}

.center-line{
width:100%;
height:2px;
top:50%;
}

.center-circle{
width:120px;
height:120px;
border:2px solid white;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
position:absolute;
}

/* oyuncu */
.player{
position:absolute;
background:#ff6a00;
color:black;
padding:6px;
border-radius:8px;
font-size:12px;
touch-action:none;
}

/* açıklama */
.desc{
font-size:12px;
opacity:0.7;
margin-top:5px;
}
</style>
</head>

<body>

<!-- GİRİŞ -->
<div id="intro">
<img src="badboysfc.jpg">
</div>

<header>🔥 BAD BOYS FC 🔥</header>

<div style="text-align:center;">
<button onclick="login()">Kaptan Girişi</button>
</div>

<h2 style="text-align:center;">🏆 MVP: <span id="mvp"></span></h2>

<div id="players"></div>

<h2 style="text-align:center;">⚽ TAKTİK SAHASI</h2>
<div class="field" id="field">
<div class="line center-line"></div>
<div class="center-circle"></div>
</div>

<script>
let isAdmin=false;

let data=JSON.parse(localStorage.getItem("teamData")) || {
players:[
{name:"Hüseyincan",desc:"Kalesinde güven veren bir panter",pos:"Kaleci",gol:0,asist:0,yenilen:0,no:1},
{name:"Süleyman",desc:"Stoperin vazgeçilmez adamı",pos:"Defans",gol:0,asist:0,yenilen:0,no:2},
{name:"Mehmet",desc:"Takımın sert adamı",pos:"Defans",gol:0,asist:0,yenilen:0,no:3},
{name:"Yakup",desc:"Her bölgeye yetişen koca yürekli kaptan",pos:"Kaptan",gol:0,asist:0,yenilen:0,no:4},
{name:"Erol",desc:"Her bölgeden şut atabilir ansızın",pos:"Orta Saha",gol:0,asist:0,yenilen:0,no:5},
{name:"Murat",desc:"Çalım ve akrobatik hareketleri sever",pos:"Forvet",gol:0,asist:0,yenilen:0,no:6},
{name:"Eren",desc:"Eşi maçı izlemeye geldiyse o maç bitmiştir",pos:"Forvet",gol:0,asist:0,yenilen:0,no:7},
{name:"Musa",desc:"Kıvrak bilekleri ile dosta korku düşmana güven verir",pos:"Forvet",gol:0,asist:0,yenilen:0,no:8}
],
positions:{}
};

function save(){
localStorage.setItem("teamData",JSON.stringify(data));
}

function login(){
let pass=prompt("Şifre:");
if(pass==="1234"){
isAdmin=true;
alert("Giriş başarılı");
render();
}
}

/* MVP */
function getMVP(){
let best=null;
let score=-1;
data.players.forEach(p=>{
let s=p.gol*2+p.asist;
if(s>score){score=s;best=p.name;}
});
return best;
}

/* PLAYER */
function render(){
let html="";
data.players.forEach((p,i)=>{
html+=`
<div class="card">
<h3>${p.name}</h3>
<p>${p.pos}</p>
<p class="desc">${p.desc}</p>

<p>⚽ ${p.gol}
<button onclick="update(${i},'gol',1)">+</button>
<button onclick="update(${i},'gol',-1)">-</button>
</p>

<p>🎯 ${p.asist}
<button onclick="update(${i},'asist',1)">+</button>
<button onclick="update(${i},'asist',-1)">-</button>
</p>

<p>🥅 ${p.yenilen}
<button onclick="update(${i},'yenilen',1)">+</button>
<button onclick="update(${i},'yenilen',-1)">-</button>
</p>

<p>No:
<input value="${p.no}" onchange="setNo(${i},this.value)">
</p>

<p>💪100 | ❤️100 | ✔100</p>
</div>
`;
});

document.getElementById("players").innerHTML=html;
document.getElementById("mvp").innerText=getMVP();
renderField();
}

/* UPDATE */
function update(i,type,val){
if(!isAdmin) return alert("Yetki yok!");
data.players[i][type]+=val;
if(data.players[i][type]<0) data.players[i][type]=0;
save();
render();
}

/* NUMARA */
function setNo(i,val){
if(!isAdmin) return;
data.players[i].no=val;
save();
}

/* SAHA (MOBİL DRAG) */
function renderField(){
let field=document.getElementById("field");
field.querySelectorAll(".player").forEach(e=>e.remove());

data.players.forEach((p,i)=>{
let div=document.createElement("div");
div.className="player";
div.innerText=p.no+" "+p.name;

let pos=data.positions[i] || {x:20+i*30,y:20};

div.style.left=pos.x+"px";
div.style.top=pos.y+"px";

/* TOUCH + MOUSE */
let move = (x,y)=>{
div.style.left=x+"px";
div.style.top=y+"px";
};

div.onpointerdown=function(e){
if(!isAdmin) return;

let shiftX=e.offsetX;
let shiftY=e.offsetY;

function onMove(ev){
move(ev.pageX-shiftX,ev.pageY-shiftY);
}

document.addEventListener("pointermove",onMove);

document.onpointerup=function(){
document.removeEventListener("pointermove",onMove);

data.positions[i]={
x:parseInt(div.style.left),
y:parseInt(div.style.top)
};

save();
document.onpointerup=null;
};
};

field.appendChild(div);
});
}

render();
</script>

</body>
</html>
