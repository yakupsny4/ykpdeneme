<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD BOYS FC | Official Portal</title>
    <style>
        :root {
            --neon-orange: #ff6600;
            --neon-blue: #00d4ff;
            --dark-bg: #0d0d0d;
            --card-bg: #161616;
            --text-gray: #b3b3b3;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        /* --- Admin Paneli --- */
        .admin-panel {
            background: #1a1a1a;
            padding: 15px;
            border-bottom: 2px solid var(--neon-orange);
            display: flex;
            justify-content: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        input[type="password"] {
            background: #000;
            border: 1px solid var(--neon-orange);
            color: white;
            padding: 8px;
            border-radius: 5px;
        }

        button.admin-btn {
            background: var(--neon-orange);
            border: none;
            color: black;
            font-weight: bold;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        /* --- Logo & Header --- */
        .header {
            text-align: center;
            padding: 30px;
        }

        .main-logo {
            width: 180px;
            border: 3px solid var(--neon-orange);
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255, 102, 0, 0.4);
        }

        /* --- MVP Alanı --- */
        .mvp-wrapper {
            margin: 20px auto;
            max-width: 400px;
            padding: 20px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid gold;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        /* --- Oyuncu Kartları --- */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--neon-orange); }

        .player-info h3 { margin: 0; color: var(--neon-orange); text-transform: uppercase; }
        .player-info p { font-size: 0.85rem; color: var(--text-gray); margin: 5px 0; }

        .stats-display {
            display: flex;
            justify-content: space-around;
            background: #000;
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: bold;
            border: 1px solid #333;
        }

        .stat-item span { color: var(--neon-blue); display: block; font-size: 1.2rem; }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .plus-minus-btns {
            display: none; /* Sadece admin girişiyle açılır */
            gap: 5px;
        }

        .btn-sm {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .btn-plus { background: #28a745; color: white; }
        .btn-minus { background: #dc3545; color: white; }

        /* --- Yoklama --- */
        .attendance-section {
            max-width: 500px;
            margin: 40px auto;
            background: #111;
            padding: 20px;
            border-radius: 15px;
        }

        .att-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }

        .att-btns button {
            background: #333;
            border: none;
            color: #777;
            padding: 5px 10px;
            margin-left: 5px;
            cursor: pointer;
            border-radius: 4px;
        }

        .att-btns button.active {
            opacity: 1;
            color: white;
            box-shadow: 0 0 10px currentColor;
        }

        .active-geliyor { background: #28a745 !important; }
        .active-yok { background: #dc3545 !important; }
        .active-belki { background: #ffc107 !important; color: black !important; }

    </style>
</head>
<body>

<div class="admin-panel">
    <input type="password" id="passInput" placeholder="Kaptan Şifresi">
    <button class="admin-btn" onclick="login()">KAPTAN GİRİŞİ</button>
</div>

<div class="header">
    <img src="badboysfc.jpg" alt="BAD BOYS FC" class="main-logo">
    <h1 style="color: var(--neon-orange); text-shadow: 0 0 10px var(--neon-orange);">BAD BOYS FC</h1>
</div>

<div class="mvp-wrapper">
    <h2 style="color: gold; margin: 0;">MVP</h2>
    <h1 id="mvp-name" style="margin: 10px 0;">YAKUP SUNAY</h1>
    <p style="color: var(--text-gray); font-style: italic;">"Her bölgeye yetişen koca bir kaptan"</p>
</div>

<div class="container" id="playerList"></div>

<div class="attendance-section">
    <h2 style="color: var(--neon-blue); text-align: center;">MAÇ YOKLAMASI</h2>
    <div id="attList"></div>
</div>

<script>
    const playersData = [
        { id: 0, name: "Hüseyin Yüksekdağ", role: "Kaleci", desc: "Kalede o varsa sırtımız sağlam", isGK: true },
        { id: 1, name: "Süleyman Tunçelik", role: "Defans", desc: "Defansın her alanına geçer" },
        { id: 2, name: "Mehmet Uzun", role: "Defans", desc: "Takımın sert adamı" },
        { id: 3, name: "Yakup Sunay", role: "Kaptan", desc: "Koca bir kaptan!" },
        { id: 4, name: "Murat Çaylı", role: "Forvet", desc: "Akrobatik ve çalımcı" },
        { id: 5, name: "Erol Gönül", role: "Orta Saha", desc: "Şutu çeker, hesabı sorar" },
        { id: 6, name: "Eren Yılmaz", role: "Forvet", desc: "Eşi izliyorsa rakibe geçmiş olsun" },
        { id: 7, name: "Musa Aksu", role: "Forvet", desc: "Kıvrak bilekler, dosta korku!" }
    ];

    let adminMode = false;

    // Verileri LocalStorage'dan Al veya Sıfırla
    let stats = JSON.parse(localStorage.getItem('bb_stats')) || playersData.map(p => ({
        gol: 0, asist: 0, yenen: 0
    }));

    let attendance = JSON.parse(localStorage.getItem('bb_att')) || Array(8).fill(null);

    function login() {
        if(document.getElementById('passInput').value === "badboysfc1907") {
            adminMode = true;
            document.querySelectorAll('.plus-minus-btns').forEach(el => el.style.display = 'flex');
            alert("Hoş geldin Kaptan!");
        } else {
            alert("Şifre yanlış!");
        }
    }

    function renderPlayers() {
        const container = document.getElementById('playerList');
        container.innerHTML = '';
        
        playersData.forEach((p, index) => {
            container.innerHTML += `
                <div class="card">
                    <div class="player-info">
                        <h3>${p.name}</h3>
                        <p>${p.role} - <i>${p.desc}</i></p>
                    </div>
                    
                    <div class="stats-display">
                        <div class="stat-item">GOL <span id="g-${index}">${stats[index].gol}</span></div>
                        <div class="stat-item">ASİST <span id="a-${index}">${stats[index].asist}</span></div>
                        ${p.isGK ? `<div class="stat-item">YENEN <span id="y-${index}">${stats[index].yenen}</span></div>` : ''}
                    </div>

                    <div class="control-group">
                        <div class="control-row">
                            <small>GOL GÜNCELLE</small>
                            <div class="plus-minus-btns" style="display: ${adminMode ? 'flex' : 'none'}">
                                <button class="btn-sm btn-minus" onclick="changeStat(${index}, 'gol', -1)">-</button>
                                <button class="btn-sm btn-plus" onclick="changeStat(${index}, 'gol', 1)">+</button>
                            </div>
                        </div>
                        <div class="control-row">
                            <small>ASİST GÜNCELLE</small>
                            <div class="plus-minus-btns" style="display: ${adminMode ? 'flex' : 'none'}">
                                <button class="btn-sm btn-minus" onclick="changeStat(${index}, 'asist', -1)">-</button>
                                <button class="btn-sm btn-plus" onclick="changeStat(${index}, 'asist', 1)">+</button>
                            </div>
                        </div>
                        ${p.isGK ? `
                        <div class="control-row">
                            <small>YENEN GOL</small>
                            <div class="plus-minus-btns" style="display: ${adminMode ? 'flex' : 'none'}">
                                <button class="btn-sm btn-minus" onclick="changeStat(${index}, 'yenen', -1)">-</button>
                                <button class="btn-sm btn-plus" onclick="changeStat(${index}, 'yenen', 1)">+</button>
                            </div>
                        </div>` : ''}
                    </div>
                </div>
            `;
        });
    }

    function changeStat(index, type, val) {
        stats[index][type] += val;
        if(stats[index][type] < 0) stats[index][type] = 0;
        localStorage.setItem('bb_stats', JSON.stringify(stats));
        renderPlayers();
    }

    function renderAttendance() {
        const div = document.getElementById('attList');
        div.innerHTML = '';
        playersData.forEach((p, index) => {
            div.innerHTML += `
                <div class="att-row">
                    <span>${p.name}</span>
                    <div class="att-btns">
                        <button class="${attendance[index] === 'geliyor' ? 'active active-geliyor' : ''}" onclick="setAtt(${index}, 'geliyor')">Geliyor</button>
                        <button class="${attendance[index] === 'yok' ? 'active active-yok' : ''}" onclick="setAtt(${index}, 'yok')">Yok</button>
                        <button class="${attendance[index] === 'belki' ? 'active active-belki' : ''}" onclick="setAtt(${index}, 'belki')">Belki</button>
                    </div>
                </div>
            `;
        });
    }

    function setAtt(index, status) {
        attendance[index] = status;
        localStorage.setItem('bb_att', JSON.stringify(attendance));
        renderAttendance();
    }

    // İlk Çalıştırma
    renderPlayers();
    renderAttendance();
</script>

</body>
</html>
