<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAD BOYS FC</title>

<style>
body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

header{
text-align:center;
padding:20px;
font-size:30px;
background:linear-gradient(90deg,orange,black);
letter-spacing:2px;
}

/* CARD */
.card{
background:#111;
border:2px solid orange;
border-radius:12px;
padding:12px;
margin:10px;
width:260px;
display:inline-block;
transition:0.3s;
}
.card:hover{
box-shadow:0 0 15px orange;
transform:scale(1.03);
}

button{
background:orange;
border:none;
padding:4px 8px;
margin:2px;
border-radius:5px;
cursor:pointer;
}

input{
width:40px;
}

/* FIELD */
.field{
width:100%;
height:420px;
background:#1a1a1a;
border:3px solid orange;
position:relative;
margin-top:20px;
}

/* çizgiler */
.field:before{
content:"";
position:absolute;
width:100%;
height:2px;
background:white;
top:50%;
}

.field:after{
content:"";
position:absolute;
width:120px;
height:120px;
border:2px solid white;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* player */
.player{
position:absolute;
background:orange;
color:black;
padding:5px;
border-radius:6px;
cursor:move;
}

/* MVP */
.mvp{
color:gold;
font-weight:bold;
}

/* match log */
#matches{
padding:10px;
}
</style>
</head>

<body>

<header>🔥 BAD BOYS FC 🔥</header>

<div style="text-align:center;">
<button onclick="login()">Kaptan Girişi</button>
<button onclick="saveMatch()">Maçı Kaydet</button>
</div>

<h2 style="text-align:center;">🏆 MVP: <span id="mvp"></span></h2>

<div id="players"></div>

<h2 style="text-align:center;">⚽ TAKTİK SAHASI</h2>
<div class="field" id="field"></div>

<h2 style="text-align:center;">📅 MAÇ GEÇMİŞİ</h2>
<div id="matches"></div>

<script>

let isAdmin=false;

let data=JSON.parse(localStorage.getItem("teamData")) || {
players:[
{name:"Hüseyincan",pos:"Kaleci",gol:0,asist:0,yenilen:0,no:1,katilim:true},
{name:"Süleyman",pos:"Defans",gol:0,asist:0,yenilen:0,no:2,katilim:true},
{name:"Mehmet",pos:"Defans",gol:0,asist:0,yenilen:0,no:3,katilim:true},
{name:"Yakup",pos:"Kaptan",gol:0,asist:0,yenilen:0,no:4,katilim:true},
{name:"Erol",pos:"Orta Saha",gol:0,asist:0,yenilen:0,no:5,katilim:true},
{name:"Murat",pos:"Forvet",gol:0,asist:0,yenilen:0,no:6,katilim:true},
{name:"Eren",pos:"Forvet",gol:0,asist:0,yenilen:0,no:7,katilim:true},
{name:"Musa",pos:"Forvet",gol:0,asist:0,yenilen:0,no:8,katilim:true}
],
positions:{},
matches:[]
};

function save(){
localStorage.setItem("teamData",JSON.stringify(data));
}

function login(){
let pass=prompt("Şifre:");
if(pass==="1234"){
isAdmin=true;
alert("Giriş başarılı");
render();
}
}

/* MVP */
function getMVP(){
let best=null;
let score=-1;

data.players.forEach(p=>{
let s=p.gol*2 + p.asist;
if(s>score){
score=s;
best=p.name;
}
});

return best;
}

/* PLAYER RENDER */
function render(){
let html="";

data.players.forEach((p,i)=>{

let rating=(p.gol*2 + p.asist);

html+=`
<div class="card">
<h3>${p.name}</h3>
<p>${p.pos}</p>

<p>⭐ Reyting: ${rating}</p>

<p>⚽ ${p.gol}
<button onclick="update(${i},'gol',1)">+</button>
<button onclick="update(${i},'gol',-1)">-</button>
</p>

<p>🎯 ${p.asist}
<button onclick="update(${i},'asist',1)">+</button>
<button onclick="update(${i},'asist',-1)">-</button>
</p>

<p>🥅 ${p.yenilen}
<button onclick="update(${i},'yenilen',1)">+</button>
<button onclick="update(${i},'yenilen',-1)">-</button>
</p>

<p>No:
<input value="${p.no}" onchange="setNo(${i},this.value)">
</p>

<p>
Katılım:
<button onclick="toggleKat(${i})">
${p.katilim ? "Geliyor" : "Yok"}
</button>
</p>

<p>💪100 | ❤️100 | ✔100</p>

</div>
`;
});

document.getElementById("players").innerHTML=html;
document.getElementById("mvp").innerText=getMVP();

renderField();
renderMatches();
}

/* UPDATE */
function update(i,type,val){
if(!isAdmin) return alert("Yetki yok!");
data.players[i][type]+=val;
if(data.players[i][type]<0) data.players[i][type]=0;
save();
render();
}

/* NUMARA */
function setNo(i,val){
if(!isAdmin) return;
data.players[i].no=val;
save();
}

/* KATILIM */
function toggleKat(i){
if(!isAdmin) return;
data.players[i].katilim=!data.players[i].katilim;
save();
render();
}

/* MATCH SAVE */
function saveMatch(){
if(!isAdmin) return;

let date=new Date().toLocaleDateString();

data.matches.push({
date:date,
players:JSON.parse(JSON.stringify(data.players))
});

save();
render();
}

/* MATCH LIST */
function renderMatches(){
let html="";
data.matches.forEach(m=>{
html+=`<p>${m.date} - Kayıt alındı</p>`;
});
document.getElementById("matches").innerHTML=html;
}

/* FIELD */
function renderField(){
let field=document.getElementById("field");
field.innerHTML="";

data.players.forEach((p,i)=>{
let div=document.createElement("div");
div.className="player";
div.innerText=p.no+" "+p.name;

let pos=data.positions[i] || {x:20+i*40,y:20};

div.style.left=pos.x+"px";
div.style.top=pos.y+"px";

div.onmousedown=function(e){
if(!isAdmin) return;

let shiftX=e.clientX-div.getBoundingClientRect().left;
let shiftY=e.clientY-div.getBoundingClientRect().top;

function moveAt(x,y){
div.style.left=x-shiftX+"px";
div.style.top=y-shiftY+"px";
}

function move(e){
moveAt(e.pageX,e.pageY);
}

document.addEventListener("mousemove",move);

document.onmouseup=function(){
document.removeEventListener("mousemove",move);

data.positions[i]={
x:parseInt(div.style.left),
y:parseInt(div.style.top)
};

save();
document.onmouseup=null;
};
};

field.appendChild(div);
});
}

render();

</script>

</body>
</html>
